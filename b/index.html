// ============================================================
//  READ ALOUD
// ============================================================
let isReadAloud = false;
let isEditMode = false;
let readAloudTimer = null;
let lastSpeakingEl = null;

function clearSpeakingHighlight() {
  document.querySelectorAll('#readerContent .char.speaking').forEach(el => {
    el.classList.remove('speaking');
  });
  lastSpeakingEl = null;
}

function highlightCharAtRawIdx(idx) {
  clearSpeakingHighlight();
  if (idx < 0 || idx >= rawText.length) return;
  const el = document.querySelector(`#readerContent .char[data-raw-idx="${idx}"]`);
  if (el) {
    el.classList.add('speaking');
    // Only scroll when the element is outside the visible viewport
    const rect = el.getBoundingClientRect();
    const viewH = window.innerHeight;
    if (rect.top < 80 || rect.bottom > viewH - 40) {
      el.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
    lastSpeakingEl = el;
  }
}

// Move to the next CJK char in rawText starting from idx (inclusive)
function nextCjkIdx(idx) {
  let i = idx;
  while (i < rawText.length) {
    if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(rawText[i])) return i;
    i++;
  }
  return -1;
}

// Split a paragraph text into sentence segments by punctuation
// Returns array of {start, end, text} where start/end are offsets within paraText
function splitIntoSentences(paraText) {
  const segments = [];
  let segStart = 0;
  for (let i = 0; i < paraText.length; i++) {
    const ch = paraText[i];
    // After a punctuation mark, end the current segment (include the punctuation)
    if (/[，。、；：！？,.;?!;:…—·\u3001\uff01\uff0c\u3002\uff1b\uff1f\uff1a]/.test(ch)) {
      segments.push({ start: segStart, end: i + 1, text: paraText.substring(segStart, i + 1) });
      segStart = i + 1;
    }
  }
  // Remaining text after last punctuation
  if (segStart < paraText.length) {
    segments.push({ start: segStart, end: paraText.length, text: paraText.substring(segStart) });
  }
  return segments;
}

// Highlight all .char elements within a sentence range [segStart, segEnd) in rawText coordinates
function highlightSentenceAtRawRange(rawStart, rawEnd) {
  clearSpeakingHighlight();
  // Find the first char element inside the range and the last, then highlight all between
  const allChars = document.querySelectorAll('#readerContent .char');
  let firstInRange = null;
  let lastInRange = null;
  for (const el of allChars) {
    const idx = parseInt(el.dataset.rawIdx);
    if (idx >= rawStart && idx < rawEnd) {
      if (!firstInRange) firstInRange = el;
      el.classList.add('speaking');
      lastInRange = el;
    }
  }
  // Scroll to the first highlighted element
  if (firstInRange) {
    const rect = firstInRange.getBoundingClientRect();
    const viewH = window.innerHeight;
    if (rect.top < 80 || rect.bottom > viewH - 40) {
      firstInRange.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
    lastSpeakingEl = firstInRange;
  }
}

function toggleReadAloud() {
  if (!window.speechSynthesis) { alert('您的浏览器不支持语音朗读'); return; }

  if (isReadAloud) {
    stopReadAloud();
    return;
  }

  if (!rawText) { alert('请先导入文件'); return; }

  // Determine start position
  let startIdx = 0;
  if (lastReadStartIndex >= 0 && lastReadStartIndex < rawText.length) {
    startIdx = lastReadStartIndex;
  }

  // Split text into paragraphs from startIdx
  const remaining = rawText.substring(startIdx);
  const paragraphs = remaining.split(/\n+/).filter(p => p.trim().length > 0);

  if (paragraphs.length === 0) { alert('没有可朗读的内容'); return; }

  isReadAloud = true;

  const lang = document.getElementById('speechLangSelect').value;
  const rate = parseFloat(document.getElementById('speechRateRange').value);
  const voiceName = document.getElementById('speechVoiceSelect').value;

  let paraIdx = 0;
  let paraRawStart = startIdx;
  // Sentence-level highlight state
  let sentences = [];
  let sentIdx = 0;

  function startHighlightTimer(paraText) {
    // Split paragraph into sentence segments
    sentences = splitIntoSentences(paraText);
    sentIdx = 0;
    if (sentences.length > 0) {
      highlightSentenceAtRawRange(
        paraRawStart + sentences[0].start,
        paraRawStart + sentences[0].end
      );
    }
  }

  function advanceToNextSentence(rawIdx) {
    // Find the next sentence whose start is >= rawIdx
    for (let i = 0; i < sentences.length; i++) {
      const s = sentences[i];
      const sRawStart = paraRawStart + s.start;
      const sRawEnd = paraRawStart + s.end;
      if (sRawStart >= rawIdx) {
        sentIdx = i;
        highlightSentenceAtRawRange(sRawStart, sRawEnd);
        return;
      }
      // If rawIdx falls within this sentence, highlight it and move to next
      if (rawIdx >= sRawStart && rawIdx < sRawEnd) {
        sentIdx = i;
        highlightSentenceAtRawRange(sRawStart, sRawEnd);
        return;
      }
    }
    // If no sentence found ahead, highlight the last one
    if (sentences.length > 0) {
      const last = sentences[sentences.length - 1];
      sentIdx = sentences.length - 1;
      highlightSentenceAtRawRange(paraRawStart + last.start, paraRawStart + last.end);
    }
  }

  function stopHighlightTimer() {
    // No interval to clear anymore
  }

  function speakNextPara() {
    if (!isReadAloud || paraIdx >= paragraphs.length) {
      stopReadAloud();
      return;
    }

    setActiveParaSpeaker(paraRawStart);

    const text = paragraphs[paraIdx].trim();
    const utt = new SpeechSynthesisUtterance(text);
    
    const hasChinese = /[\u4e00-\u9fa5]/.test(text);
    let useLang = lang;
    
    if (hasChinese && lang !== 'zh-CN') {
      useLang = 'zh-CN';
    } else if (!hasChinese && lang !== 'en-US') {
      useLang = 'en-US';
    }
    
    utt.lang = useLang;
    utt.rate = rate;
    utt.pitch = 1;
    
    if (useLang === lang) {
      if (voiceName) {
        const voice = speechVoices.find(v => v.name === voiceName);
        if (voice) utt.voice = voice;
      }
    } else {
      if (voiceByLang[useLang]) {
        const savedVoice = speechVoices.find(v => v.name === voiceByLang[useLang]);
        if (savedVoice) utt.voice = savedVoice;
      }
      if (!utt.voice) {
        const defaultVoice = speechVoices.find(v => v.lang.startsWith(useLang.split('-')[0]));
        if (defaultVoice) utt.voice = defaultVoice;
      }
    }

    // Use boundary event to advance sentence highlight when TTS reaches a word boundary
    utt.onboundary = (e) => {
      if (e.name === 'word' && e.charIndex >= 0) {
        const rawIdx = paraRawStart + e.charIndex;
        advanceToNextSentence(rawIdx);
      }
    };

    utt.onend = () => {
      stopHighlightTimer();
      clearSpeakingHighlight();

      const mode = document.getElementById('speechModeSelect').value;
      const pauseSec = parseFloat(document.getElementById('speechPauseRange').value);

      if (mode === 'loop') {
        // Repeat current paragraph
        if (isReadAloud) {
          readAloudTimer = setTimeout(speakNextPara, pauseSec * 1000);
        }
      } else if (mode === 'single') {
        stopReadAloud();
      } else {
        // continuous: advance to next paragraph
        paraIdx++;
        paraRawStart += text.length;
        while (paraRawStart < rawText.length && (rawText[paraRawStart] === '\n' || rawText[paraRawStart] === '\r')) {
          paraRawStart++;
        }
        if (paraIdx < paragraphs.length && isReadAloud) {
          readAloudTimer = setTimeout(speakNextPara, pauseSec * 1000);
        } else {
          stopReadAloud();
        }
      }
    };
    utt.onerror = () => { stopReadAloud(); };

    // Start highlight timer
    startHighlightTimer(text);
    window.speechSynthesis.speak(utt);
  }

  speakNextPara();
}

function stopReadAloud() {
  isReadAloud = false;
  if (readAloudTimer) { clearTimeout(readAloudTimer); readAloudTimer = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  clearSpeakingHighlight();
  clearActiveParaSpeaker();
}

// ============================================================
//  AUTO COLLECT
// ============================================================
function autoCollectChar(char, pinyin, translation) {
  const wasNew = !collections[char];
  // Only keep translation for English mode
  const newTranslation = queryEngine !== 'zh' ? (translation || '') : '';
  
  if (collections[char]) {
    collections[char].pinyin = pinyin;
    if (newTranslation) collections[char].translation = newTranslation;
  } else {
    const oldNote = removedNotes[char] || '';
    collections[char] = { pinyin: pinyin, translation: newTranslation, note: oldNote, category: lastUsedCategory, order: Date.now() };
  }
  
  // Clear saved note since it's been restored
  if (removedNotes[char]) {
    delete removedNotes[char];
    removeRemovedNote(char);
  }
  // If still viewing this char, fill the textarea with restored note
  if (currentChar === char && collections[char].note) {
    const notesArea = document.getElementById('modalNotes');
    if (notesArea && !notesArea.value) notesArea.value = collections[char].note;
  }
  persistCollections();
  renderCollections();
  if (wasNew && rawText) renderText(rawText);
  updateCharTooltip(char);
  // Light up the star only if still viewing this char
  if (currentChar === char) {
    const starBtn = document.getElementById('modalStar');
    starBtn.textContent = '★';
    starBtn.classList.add('active');
  }
}

// --- ECDICT Local Dictionary ---
async function loadEcdict() {
  if (ecdictLoaded) return;
  try {
    const db = await openDB();
    const tx = db.transaction('ecdict_cache', 'readonly');
    const store = tx.objectStore('ecdict_cache');
    const req = store.get('data');
    return new Promise((resolve) => {
      req.onsuccess = () => {
        if (req.result && req.result.data) {
          ecdictData = req.result.data;
          ecdictLoaded = true;
          console.log('ECDICT loaded from IndexedDB cache');
          resolve(true);
        } else {
          resolve(false);
        }
      };
      req.onerror = () => resolve(false);
    });
  } catch(e) {
    console.error('Load ECDICT from cache failed:', e);
    return false;
  }
}

function fetchAndCacheEcdict() {
  return new Promise((resolve) => {
    // Use script tag to bypass file:// CORS restriction
    const script = document.createElement('script');
    script.src = './ecdict.js';
    script.onload = () => {
      if (typeof ECDICT_DATA !== 'undefined') {
        ecdictData = ECDICT_DATA;
        ecdictLoaded = true;
        // Cache to IndexedDB in background
        try {
          openDB().then(db => {
            const tx = db.transaction('ecdict_cache', 'readwrite');
            tx.objectStore('ecdict_cache').put({ id: 'data', data: ecdictData });
          });
        } catch(e) {
          console.error('Cache ECDICT failed:', e);
        }
        console.log('ECDICT loaded from script and cached');
        resolve(true);
      } else {
        resolve(false);
      }
    };
    script.onerror = () => {
      console.error('Failed to load ecdict.js');
      resolve(false);
    };
    document.head.appendChild(script);
  });
}

// Query a word from ECDICT. Returns { phonetic, translation, exchange, tag, bnc, frq } or null
function queryEcdict(word) {
  if (!ecdictData || !word) return null;
  let entry = ecdictData[word.toLowerCase()];
  if (!entry) return null;
  // Handle @ redirect (e.g. "ages" -> "@age" -> lookup "age")
  if (entry.startsWith('@')) {
    const lemma = entry.substring(1);
    entry = ecdictData[lemma] || null;
    if (!entry) return null;
  }
  const parts = entry.split('|');
  return {
    phonetic: parts[0] || '',
    translation: parts[1] || '',
    exchange: parts[2] || '',
    tag: parts[3] || '',
    bnc: parts[4] || '',
    frq: parts[5] || ''
  };
}

// Ensure ECDICT is loaded (tries cache first, then fetches file)
async function ensureEcdictLoaded() {
  if (ecdictLoaded) return true;
  const cached = await loadEcdict();
  if (cached) return true;
  return await fetchAndCacheEcdict();
}

// --- English Dictionary (ECDICT local + Online API fallback) ---
async function fetchEnglishWordInfo(word) {
  let phonetic = '';
  let translation = '';
  let fromLocal = false;

  // Priority 1: Query ECDICT local dictionary
  await ensureEcdictLoaded();
  const local = queryEcdict(word);
  if (local) {
    phonetic = local.phonetic || '';
    translation = local.translation || '';
    fromLocal = true;
  }

  // Priority 2: Online API fallback (if local not found)
  if (!fromLocal) {
    // Fetch Chinese translation from MyMemory API
    try {
      const trRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|zh-CN`);
      if (trRes.ok) {
        const trData = await trRes.json();
        if (trData.responseStatus === 200 && trData.responseData) {
          translation = trData.responseData.translatedText || '';
        }
      }
    } catch (err) {
      console.error('Translation fetch error:', err);
    }

    // Fetch phonetic from Free Dictionary API
    try {
      const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word.toLowerCase())}`);
      if (res.ok) {
        const data = await res.json();
        if (Array.isArray(data) && data.length > 0) {
          const entry = data[0];
          if (entry.phonetic) {
            phonetic = entry.phonetic;
          } else if (entry.phonetics && entry.phonetics.length > 0) {
            const ph = entry.phonetics.find(p => p.text) || entry.phonetics[0];
            phonetic = ph.text || '';
          }
        }
      }
    } catch (err) {
      console.error('Phonetic fetch error:', err);
    }
  }

  // Display phonetic
  if (currentChar === word) {
    document.getElementById('modalPinyin').textContent = phonetic || '未知';
  }

  // Display definition + extra info if from ECDICT
  if (currentChar === word) {
    let defHtml = '';
    if (translation) {
      defHtml += escapeHtml(translation).replace(/\\n/g, '<br>');
    }
    if (fromLocal && local) {
      // Show tag labels
      if (local.tag) {
        const tagLabels = local.tag.split(/\s+/).map(t => {
          const names = { zk:'中考', gk:'高考', cet4:'四级', cet6:'六级', ky:'考研', toefl:'托福', gre:'GRE', ielts:'雅思' };
          return names[t] || t;
        });
        defHtml += '<br><span style="color:#888;font-size:12px;">📚 ' + tagLabels.join(' | ') + '</span>';
      }
      // Show word frequency
      if (local.bnc || local.frq) {
        let freqParts = [];
        if (local.bnc) freqParts.push('BNC:' + local.bnc);
        if (local.frq) freqParts.push('FRQ:' + local.frq);
        defHtml += '<br><span style="color:#888;font-size:12px;">📊 ' + freqParts.join(' | ') + '</span>';
      }
      // Show word forms
      if (local.exchange) {
        const formNames = { p:'过去式', d:'过去分词', i:'现在分词', '3':'三单', s:'复数', r:'比较级', t:'最高级', '0':'原形', '1':'变形' };
        const forms = local.exchange.split('/').map(f => {
          const parts = f.split(':');
          const name = formNames[parts[0]] || parts[0];
          return name + ':' + parts[1];
        });
        defHtml += '<br><span style="color:#888;font-size:12px;">🔄 ' + forms.join(' | ') + '</span>';
      }
    }
    document.getElementById('modalDefinition').innerHTML = defHtml || '暂无释义';
  }

  // Auto-collect (respect user setting)
  const autoCollect = document.getElementById('autoCollectCheckbox');
  // Clean translation for single-line display
  const cleanTranslation = translation.replace(/[\n\r]+/g, ' ').replace(/\s+/g, ' ').trim();
  if (phonetic && autoCollect && autoCollect.checked) {
    autoCollectChar(word, phonetic, cleanTranslation);
  } else if (collections[word]) {
    if (phonetic) collections[word].pinyin = phonetic;
    if (cleanTranslation) collections[word].translation = cleanTranslation;
    persistCollections();
    updateCharTooltip(word);
  }
}

// --- Chinese Dictionary (existing logic) ---
async function fetchCharInfo(char) {
  let pinyin = '';

  // Priority 1: local pinyin-pro library
  try {
    if (window.pinyinPro && typeof window.pinyinPro.pinyin === 'function') {
      pinyin = window.pinyinPro.pinyin(char) || '';
    }
  } catch (e) {
    // silent fail
  }

  // Priority 2: online API (moedict)
  let defs = null;
  try {
    const res = await fetch(`https://www.moedict.tw/raw/${encodeURIComponent(char)}`);
    if (res.ok) {
      const data = await res.json();
      // Use online pinyin if local is missing
      if (!pinyin) {
        pinyin = (data.heteronyms && data.heteronyms[0] && data.heteronyms[0].pinyin) || '';
      }
      defs = data.heteronyms && data.heteronyms[0] && data.heteronyms[0].definitions;

      // Definition
      if (defs && defs.length) {
        let defText = '';
        defs.forEach((d, i) => {
          if (d.type) defText += `【${d.type}】`;
          defText += d.def;
          if (d.example) defText += `\n例：${d.example}`;
          if (i < defs.length - 1) defText += '\n';
        });
        if (currentChar === char) {
          document.getElementById('modalDefinition').textContent = defText.trim();
        }
      } else {
        if (currentChar === char) {
          document.getElementById('modalDefinition').textContent = '暂无释义';
        }
      }
    }
  } catch (err) {
    console.error('Dictionary fetch error:', err);
    if (currentChar === char) {
      document.getElementById('modalDefinition').textContent = '网络异常，请检查网络连接';
    }
  }

  // Fallback: online pinyin-only API
  if (!pinyin) {
    try {
      const pyRes = await fetch(`https://pinyinapi.sstration.cn/api/v1/pinyin/${encodeURIComponent(char)}`);
      if (pyRes.ok) {
        const pyData = await pyRes.json();
        if (pyData && pyData.pinyin) {
          pinyin = pyData.pinyin;
        }
      }
    } catch(e2) {
      // silent fallback
    }
  }

  // Display pinyin
  if (currentChar === char) {
    document.getElementById('modalPinyin').textContent = pinyin || '未知';
  }

  // Auto-collect (respect user setting)
  const autoCollect = document.getElementById('autoCollectCheckbox');
  if (pinyin && autoCollect && autoCollect.checked) {
    autoCollectChar(char, pinyin);
  } else if (collections[char] && pinyin) {
    collections[char].pinyin = pinyin;
    persistCollections();
    updateCharTooltip(char);
  }
}

function generateMnemonic(char) {
  const code = char.charCodeAt(0);

  // Common radicals and their meanings
  const radicalMap = {
    '亻': '人', '彳': '行走', '氵': '水', '火': '火', '土': '土',
    '艹': '草', '木': '树', '口': '口', '扌': '手', '女': '女',
    '月': '月/肉', '日': '日', '目': '眼', '足': '脚', '石': '石',
    '山': '山', '雨': '雨', '风': '风', '心': '心', '金': '金',
    '饣': '食', '纟': '丝', '虫': '虫', '辶': '行走', '阝': '土丘',
    '门': '门', '鸟': '鸟', '鱼': '鱼', '马': '马', '车': '车'
  };

  // Left/right radical extraction (simplified)
  let tip = `"${char}"字的记忆小技巧：\n`;

  // Try to decompose
  if (char.length === 1) {
    // Check if it looks like a simple character
    if (code < 0x4E00 || code > 0x9FFF) {
      tip += `这个字符比较特别，不属于常用汉字范围。`;

    }

// Update tooltip content for a character/word in the reader without full re-render
function updateCharTooltip(ch) {
  // Use attribute selector for direct lookup instead of iterating all spans
  const safeCh = ch.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
  const chars = document.querySelectorAll('.reader-content .char[data-char="' + safeCh + '"]');
  chars.forEach(el => {
    const coll = collections[ch];
    if (!coll || !isInFilteredCollection(ch)) {
      el.classList.remove('collected');
      const tip = el.querySelector('.char-tooltip');
      if (tip) tip.remove();
      return;
    }
    el.classList.add('collected');
    let tip = el.querySelector('.char-tooltip');
    if (!tip) {
      tip = document.createElement('span');
      tip.className = 'char-tooltip';
      el.appendChild(tip);
    }
    const pinyin = coll.pinyin || '';
    const translation = coll.translation || '';
    const note = coll.note || '';
    const firstMeaning = getFirstChineseWord(translation);
    let text = pinyin;
    if (firstMeaning) text += (text ? ' | ' : '') + firstMeaning;
    if (note) text += (text ? ' | ' : '') + note;
    tip.textContent = text;
  });
}

// Remove highlight from a character/word in the reader without full re-render
function removeCharHighlight(ch) {
  const safeCh = ch.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
  const els = document.querySelectorAll('.reader-content .char[data-char="' + safeCh + '"]');
  if (els.length > 0) {
    els.forEach(el => {
      el.classList.remove('collected-phrase', 'collected-single');
      // If this single char/word is still collected on its own (and matches filter), keep collected style
      const spanChar = el.dataset.char;
      if (isInFilteredCollection(spanChar)) {
        el.classList.add('collected');
        updateCharTooltip(spanChar);
      } else {
        el.classList.remove('collected');
        const tip = el.querySelector('.char-tooltip');
        if (tip) tip.remove();
      }
    });
    return;
  }
  // For multi-char word with no direct span match, try localized removal
  if (ch.length > 1 && ch.indexOf(' ') !== -1) {
    // English multi-word phrase: find and unhighlight consecutive word spans
    const parts = ch.split(' ');
    const charList = Array.from(document.querySelectorAll('#readerContent .char'));
    for (let si = 0; si <= charList.length - parts.length; si++) {
      let match = true;
      for (let p = 0; p < parts.length; p++) {
        if (!charList[si + p] || charList[si + p].dataset.char !== parts[p]) {
          match = false; break;
        }
        if (p > 0) {
          const between = document.createRange();
          between.setStartAfter(charList[si + p - 1]);
          between.setEndBefore(charList[si + p]);
          if (!/^\s*$/.test(between.toString())) { match = false; break; }
        }
      }
      if (match) {
        for (let p = 0; p < parts.length; p++) {
          const span = charList[si + p];
          span.classList.remove('collected-phrase', 'collected-single');
          if (isInFilteredCollection(span.dataset.char)) {
            span.classList.add('collected');
            updateCharTooltip(span.dataset.char);
          } else {
            span.classList.remove('collected');
            const tip = span.querySelector('.char-tooltip');
            if (tip) tip.remove();
          }
        }
      }
    }
    return;
  }
  // Fallback: full re-render for other multi-char words (Chinese phrases)
  if (ch.length > 1) {
    renderText(rawText);
  }
}

function toggleCollect() {
  const ch = currentChar;
  if (!ch) return;

  const starBtn = document.getElementById('modalStar');
  const categorySelector = document.getElementById('modalCategorySelector');

  if (collections[ch]) {
    // Remove — save note to removedNotes for future re-add
    const note = document.getElementById('modalNotes').value;
    if (note) {
      removedNotes[ch] = note;
      persistRemovedNote(ch, note);
    }
    delete collections[ch];
    starBtn.textContent = '☆';
    starBtn.classList.remove('active');
    categorySelector.classList.add('disabled');
  } else {
    // Add — use saved note if available, move to end of object
    const savedNote = removedNotes[ch] || '';
    // Get definition text only for English mode
    let definition = '';
    if (queryEngine !== 'zh') {
      const defEl = document.getElementById('modalDefinition');
      if (defEl) {
        definition = defEl.innerText || defEl.textContent || '';
        definition = definition.replace(/[\n\r]+/g, ' ').replace(/\s+/g, ' ').trim();
      }
    }
    collections[ch] = {
      pinyin: document.getElementById('modalPinyin').textContent,
      translation: definition,
      note: document.getElementById('modalNotes').value || savedNote,
      category: document.getElementById('modalCategoryValue').textContent || '未掌握',
      order: Date.now()
    };
    // If there was a saved note and the textarea was empty, fill it in
    if (savedNote && !document.getElementById('modalNotes').value) {
      document.getElementById('modalNotes').value = savedNote;
    }
    // Clear the saved note since it's been restored
    if (removedNotes[ch]) {
      delete removedNotes[ch];
      removeRemovedNote(ch);
    }
    starBtn.textContent = '★';
    starBtn.classList.add('active');
    categorySelector.classList.remove('disabled');
  }

  persistCollections();
  renderCollections();
  if (collections[ch]) {
    updateCharTooltip(ch);
  } else {
    removeCharHighlight(ch); //局部移除高亮，避免全文重渲染
  }
}

function deleteCollection(ch) {
  // Save note to removedNotes for future re-add
  if (collections[ch] && collections[ch].note) {
    removedNotes[ch] = collections[ch].note;
    persistRemovedNote(ch, collections[ch].note);
  }
  delete collections[ch];
  persistCollections();
  renderCollections();
  removeCharHighlight(ch); //局部移除高亮，避免全文重渲染
}

function renderCollections() {
  const body = document.getElementById('collectionsBody');
  const allKeys = Object.keys(collections);
  document.getElementById('colCount').textContent = allKeys.length;

  // Skip expensive list rendering if panel is closed
  const panel = document.getElementById('collectionsPanel');
  if (panel && !panel.classList.contains('show')) {
    return;
  }

  if (allKeys.length === 0) {
    body.innerHTML = '<div class="empty-hint">还没有收藏任何字/词<br>阅读时单击一个字或选中的文本都可调出查询窗口，点击五角星即可加入\取消收藏</div>';
    return;
  }

  // Apply category filter
  let keys = allKeys;
  if (colCategoryFilter && colCategoryFilter !== '') {
    keys = allKeys.filter(ch => (collections[ch].category || '未掌握') === colCategoryFilter);
  }

  // Apply search filter
  if (colSearchText) {
    const q = colSearchText.toLowerCase();
    keys = keys.filter(ch => {
      const item = collections[ch];
      return ch.toLowerCase().includes(q) ||
             (item.pinyin || '').toLowerCase().includes(q) ||
             (item.translation || '').toLowerCase().includes(q) ||
             (item.note || '').toLowerCase().includes(q) ||
             (item.category || '').toLowerCase().includes(q);
    });
  }

  if (keys.length === 0) {
    if (colSearchText) {
      body.innerHTML = `<div class="empty-hint">没有匹配"${escapeHtml(colSearchText)}"的字/词<br>点击下拉箭头修改搜索</div>`;
    } else if (colCategoryFilter) {
      body.innerHTML = `<div class="empty-hint">没有类别为"${colCategoryFilter}"的字/词<br>点击下拉箭头切换筛选条件</div>`;
    } else {
      body.innerHTML = `<div class="empty-hint">还没有收藏任何字/词</div>`;
    }
    document.getElementById('filterArrow').textContent = '全部 0 ▾';
    return;
  }

  const categoryText = colCategoryFilter ? colCategoryFilter : '全部';
  document.getElementById('filterArrow').textContent = categoryText + ' ' + keys.length + ' ▾';

  // Use array join instead of string concatenation for better performance with large lists
  const parts = [];
  for (let i = keys.length - 1; i >= 0; i--) {
    const ch = keys[i];
    const item = collections[ch];
    const hasChinese = /[\u4e00-\u9fa5]/.test(ch);
    // 中文词组（多个汉字）时，展开只显示拼音和笔记，不显示基本解释
    const isZhWord = hasChinese && ch.length > 1;
    const dblClick = hasChinese
      ? `openCharModal('${escapeHtml(ch)}')`
      : `openWordModal('${escapeHtml(ch)}')`;
    parts.push(`<div class="collection-item" onclick="toggleCollectionDetail(this)">
      <span class="col-char" lang="${hasChinese ? 'zh' : 'en'}" style="cursor:pointer;" onclick="event.stopPropagation();${dblClick}">${escapeHtml(ch)}</span>
      <div class="col-info">
        <div class="col-detail" style="display:none;">
          <div class="col-pinyin">${escapeHtml(item.pinyin || '')}</div>
          ${(!isZhWord && item.translation) ? `<div class="col-translation">${escapeHtml(item.translation.replace(/\\n/g, '; ').replace(/\n/g, '; '))}</div>` : ''}
          ${item.note ? `<div class="col-note">${escapeHtml(item.note.replace(/\n/g, '; '))}</div>` : ''}
        </div>
      </div>
      <div class="col-category">
        ${escapeHtml(item.category || '未掌握')}
      </div>
      <button class="col-del" onclick="event.stopPropagation();deleteCollection('${escapeHtml(ch)}')" title="删除">✕</button>
    </div>`);
  }
  body.innerHTML = parts.join('');
}

// Check if a collected char/word matches the current collection filter (category + search).
// Used to decide whether to apply color highlight in the reading body.
function isInFilteredCollection(ch) {
  if (!collections[ch]) return false;
  if (colCategoryFilter && colCategoryFilter !== '') {
    if ((collections[ch].category || '未掌握') !== colCategoryFilter) return false;
  }
  if (colSearchText) {
    const q = colSearchText.toLowerCase();
    const item = collections[ch];
    const matches = ch.toLowerCase().includes(q) ||
           (item.pinyin || '').toLowerCase().includes(q) ||
           (item.translation || '').toLowerCase().includes(q) ||
           (item.note || '').toLowerCase().includes(q) ||
           (item.category || '').toLowerCase().includes(q);
    if (!matches) return false;
  }
  return true;
}

  const dd = document.getElementById('colFilterDropdown');
  let html = '';
  html += `<div class="col-filter-option${!colCategoryFilter ? ' active' : ''}" onclick="setColFilter('')">全部类别</div>`;
  const allCategories = getAllCategories();
  for (const cat of allCategories) {
    const active = colCategoryFilter === cat ? ' active' : '';
    html += `<div class="col-filter-option${active}" onclick="setColFilter('${escapeHtml(cat)}')">${escapeHtml(cat)}</div>`;
  }
  html += `<div class="col-filter-search" onclick="event.stopPropagation()">
    <input type="text" id="colSearchInput" placeholder="搜索字/拼音/笔记/类别" value="${escapeHtml(colSearchText)}" onkeydown="if(event.key==='Enter'){setColSearch();}">
    <button onclick="setColSearch()">确定</button>
  </div>`;
  dd.innerHTML = html;
}

function getAllCategories() {
  const cats = new Set([...defaultCategories, ...userCategories]);
  for (const ch in collections) {
    if (collections[ch].category) {
      cats.add(collections[ch].category);
    }
  }
  return Array.from(cats).sort();
}

function setColFilter(category) {
  colCategoryFilter = category;
  colSearchText = '';
  document.getElementById('colFilterDropdown').classList.remove('show');
  document.getElementById('filterArrow').classList.remove('open');
  renderCollections();
  if (rawText) renderText(rawText);
}

function setColSearch() {
  const input = document.getElementById('colSearchInput');
  colSearchText = input ? input.value.trim() : '';
  document.getElementById('colFilterDropdown').classList.remove('show');
  document.getElementById('filterArrow').classList.remove('open');
  renderCollections();
  if (rawText) renderText(rawText);
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  const target = e.target;
  if (target.closest('.category-dropdown') || 
      target.closest('.category-selector')) {
    return;
  }
  const dd = document.getElementById('colFilterDropdown');
  if (dd && dd.classList.contains('show')) {
    dd.classList.remove('show');
    document.getElementById('filterArrow').classList.remove('open');
  }
  const modalDd = document.getElementById('modalCategoryDropdown');
  if (modalDd && modalDd.classList.contains('show')) {
    modalDd.classList.remove('show');
  }
});

function toggleModalCategoryDropdown(e) {
  if (e) e.stopPropagation();
  const dd = document.getElementById('modalCategoryDropdown');
  const isOpen = dd.classList.contains('show');
  if (isOpen) {
    dd.classList.remove('show');
  } else {
    buildModalCategoryDropdown();
    dd.classList.add('show');
  }
}

function buildModalCategoryDropdown() {
  const dd = document.getElementById('modalCategoryDropdown');
  const currentVal = document.getElementById('modalCategoryValue').textContent;
  let html = '';
  const allCats = getAllCategories();
  for (const cat of allCats) {
    const active = cat === currentVal ? ' active' : '';
    html += `<div class="category-option${active}" onclick="event.stopPropagation();selectModalCategory('${escapeHtml(cat)}')">${escapeHtml(cat)}</div>`;
  }
  html += `<div style="border-top:1px solid var(--border);margin:4px 0;"></div>
    <input type="text" class="category-custom-input" id="modalCustomCategoryInput" placeholder="新建类别..." onkeydown="if(event.key==='Enter'){createModalCustomCategory();}" onclick="event.stopPropagation()">
    <button class="category-custom-btn" onclick="event.stopPropagation();createModalCustomCategory()">创建</button>`;
  dd.innerHTML = html;
}

function selectModalCategory(cat) {
  document.getElementById('modalCategoryValue').textContent = cat;
  document.getElementById('modalCategoryDropdown').classList.remove('show');
  // 记录最后一次使用的类别并持久化
  if (lastUsedCategory !== cat) {
    lastUsedCategory = cat;
    saveSettings();
  }
  if (currentChar && collections[currentChar]) {
    collections[currentChar].category = cat;
    persistCollections();
    renderCollections();
  }
}

function createModalCustomCategory() {
  const input = document.getElementById('modalCustomCategoryInput');
  const val = input.value.trim();
  if (!val) return;
  if (!userCategories.includes(val)) {
    userCategories.push(val);
    persistUserCategories();
  }
  selectModalCategory(val);
}

// ============================================================
//  SETTINGS PERSISTENCE
// ============================================================
async function saveSettings() {
  try {
    const currentLang = document.getElementById('speechLangSelect').value;
    const currentVoice = document.getElementById('speechVoiceSelect').value;
    if (currentLang && currentVoice) {
      voiceByLang[currentLang] = currentVoice;
    }
    const settings = {
      id: 'app_settings',
      fontSize: document.getElementById('fontSizeRange').value,
      fontFamily: document.getElementById('fontFamilySelect').value,
      speechLang: document.getElementById('speechLangSelect').value,
      speechVoice: document.getElementById('speechVoiceSelect').value,
      speechRate: document.getElementById('speechRateRange').value,
      speechMode: document.getElementById('speechModeSelect').value,
      speechPause: document.getElementById('speechPauseRange').value,
      autoCollect: document.getElementById('autoCollectCheckbox').checked,
      queryEngine: document.getElementById('queryEngineSelect').value,
      userCategories: userCategories,
      voiceByLang: voiceByLang,
      lastUsedCategory: lastUsedCategory
    };
    await dbPut('settings', settings);
    // Also save per-article language settings
    if (currentArticleName) await saveArticleLangSettings();
  } catch(e) { console.error('Save settings failed:', e); }
}

async function loadSettings() {
  try {
    const data = await dbGet('settings', 'app_settings');
    if (data) {
      if (data.fontSize) {
        document.getElementById('fontSizeRange').value = data.fontSize;
        document.getElementById('fontSizeVal').textContent = data.fontSize;
        document.getElementById('readerContent').style.fontSize = data.fontSize + 'px';
      }
      if (data.fontFamily) {
        document.getElementById('fontFamilySelect').value = data.fontFamily;
        document.getElementById('readerContent').style.fontFamily = data.fontFamily;
      }
      if (data.speechLang) {
        document.getElementById('speechLangSelect').value = data.speechLang;
      }
      if (data.speechRate) {
        document.getElementById('speechRateRange').value = data.speechRate;
        document.getElementById('speechRateVal').textContent = data.speechRate;
      }
      if (data.speechVoice) {
        window._pendingSpeechVoice = data.speechVoice;
      }
      if (data.speechMode) {
        document.getElementById('speechModeSelect').value = data.speechMode;
      }
      if (data.speechPause) {
        document.getElementById('speechPauseRange').value = data.speechPause;
        document.getElementById('speechPauseVal').textContent = data.speechPause;
      }
      if (data.autoCollect !== undefined) {
        document.getElementById('autoCollectCheckbox').checked = data.autoCollect;
      }
      if (data.queryEngine) {
        document.getElementById('queryEngineSelect').value = data.queryEngine;
        queryEngine = data.queryEngine;
      }
      if (data.userCategories) {
        userCategories = data.userCategories;
      }
      if (data.voiceByLang) {
        voiceByLang = data.voiceByLang;
      }
      if (data.lastUsedCategory) {
        lastUsedCategory = data.lastUsedCategory;
      }
    }
  } catch(e) { console.error('Load settings failed:', e); }
}

async function persistUserCategories() {
  try {
    const db = await openDB();
    const data = await dbGet('settings', 'app_settings');
    if (data) {
      await dbPut('settings', { ...data, userCategories: userCategories });
    }
  } catch(e) { console.error('Save user categories failed:', e); }
}

// ============================================================
//  PERSISTENCE
// ============================================================
let persistCollectionsTimer = null;

async function persistCollections() {
  if (persistCollectionsTimer) clearTimeout(persistCollectionsTimer);
  persistCollectionsTimer = setTimeout(async () => {
    persistCollectionsTimer = null;
    try {
      const db = await openDB();
      const tx = db.transaction('collections', 'readwrite');
      const store = tx.objectStore('collections');

      // 获取当前数据库中所有已存的 key
      const existingKeys = new Set();
      await new Promise((resolve, reject) => {
        const req = store.getAllKeys();
        req.onsuccess = () => {
          req.result.forEach(k => existingKeys.add(k));
          resolve();
        };
        req.onerror = e => reject(e.target.error);
      });

      // 遍历当前 collections，upsert
      for (const [char, val] of Object.entries(collections)) {
        store.put({ char, ...val });
        existingKeys.delete(char); // 标记为仍需要
      }
      // 删除已不在 collections 中的条目
      for (const key of existingKeys) {
        store.delete(key);
      }

      await new Promise((resolve, reject) => {
        tx.oncomplete = resolve;
        tx.onerror = e => reject(e.target.error);
      });
    } catch(e) { console.error('Save collections failed:', e); }
  }, 400);
}

async function loadCollections() {
  try {
    const items = await dbGetAll('collections');
    collections = {};
    items.sort((a, b) => (a.order || 0) - (b.order || 0));
    items.forEach(item => {
      const category = item.category || '未掌握';
      collections[item.char] = { pinyin: item.pinyin || '', translation: item.translation || '', note: item.note || '', category: category, order: item.order || 0 };
      if (!item.category) {
        dbPut('collections', { ...item, category: category });
      }
    });
  } catch(e) {
    console.error('Load collections failed:', e);
    collections = {};
  }
}

// ============================================================
//  REMOVED NOTES (已删除收藏的笔记缓存)
// ============================================================
async function loadRemovedNotes() {
  try {
    const items = await dbGetAll('removed_notes');
    removedNotes = {};
    items.forEach(item => {
      removedNotes[item.char] = item.note || '';
    });
  } catch(e) {
    console.error('Load removed notes failed:', e);
    removedNotes = {};
  }
}

async function persistRemovedNote(char, note) {
  try {
    await dbPut('removed_notes', { char, note });
  } catch(e) { console.error('Save removed note failed:', e); }
}

async function removeRemovedNote(char) {
  try {
    const db = await openDB();
    const tx = db.transaction('removed_notes', 'readwrite');
    tx.objectStore('removed_notes').delete(char);
    tx.oncomplete = () => {};
    tx.onerror = e => console.error('Delete removed note failed:', e.target.error);
  } catch(e) { console.error('Delete removed note failed:', e); }
}

// ============================================================
//  EXPORT / IMPORT (全量备份恢复)
// ============================================================
async function exportAllData() {
  try {
    const articles = await dbGetAll('articles');
    const collectionsItems = await dbGetAll('collections');
    const settings = await dbGet('settings', 'app_settings');
    
    const backup = {
      _type: 'PDJ阅读天天练备份',
      _version: 2,
      _date: new Date().toISOString(),
      articles: articles,
      collections: collectionsItems,
      settings: settings || null
    };
    
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `PDJ阅读备份_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('导出失败：' + e.message);
  }
}

async function importAllData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data || data._type !== 'PDJ阅读天天练备份') {
        alert('文件格式不正确，请选择正确的 PDJ 阅读天天练备份文件。');
        return;
      }
      
      let articleCount = 0, collectionCount = 0;
      
      // Import articles
      if (data.articles && Array.isArray(data.articles)) {
        for (const article of data.articles) {
          await dbPut('articles', article);
          articleCount++;
        }
      }
      
      // Import collections
      if (data.collections && Array.isArray(data.collections)) {
        for (const item of data.collections) {
          const category = item.category || '未掌握';
          collections[item.char] = { pinyin: item.pinyin || '', translation: item.translation || '', note: item.note || '', category: category, order: item.order || Date.now() };
          await dbPut('collections', { ...item, category: category });
          collectionCount++;
        }
      }
      
      // Import settings
      if (data.settings) {
        await dbPut('settings', data.settings);
      }
      
      // Refresh UI
      renderCollections();
      await loadSettings();
      await renderArticleList();
      if (rawText) renderText(rawText);
      
      alert(`导入成功！\n- 已读文章：${articleCount} 篇\n- 收藏汉字：${collectionCount} 个\n- 设置参数：${data.settings ? '已恢复' : '无'}`);
    } catch(err) {
      alert('导入失败：' + err.message);
    }
  };
  reader.readAsText(file, 'UTF-8');
  document.getElementById('importAllInput').value = '';
}

async function clearAllData() {
  if (!confirm('是否要清空当前用户的数据？请提前做好备份。')) return;
  try {
    const db = await openDB();
    const storeNames = Array.from(db.objectStoreNames);
    await new Promise((resolve, reject) => {
      const tx = db.transaction(storeNames, 'readwrite');
      storeNames.forEach(name => tx.objectStore(name).clear());
      tx.oncomplete = resolve;
      tx.onerror = e => reject(e.target.error);
    });
    db.close();

    // 重置内存状态
    collections = {};
    paraReadRecords = {};
    rawText = '';
    currentArticleName = '';
    lastReadStartIndex = -1;
    userCategories = [];
    lastUsedCategory = '未掌握';
    colCategoryFilter = '';
    colSearchText = '';

    // 刷新 UI
    renderCollections();
    await loadSettings();
    goHome();
    alert('当前用户的数据已清空。');
  } catch(e) {
    alert('清空失败：' + e.message);
  }
}
