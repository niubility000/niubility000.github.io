<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>PDJ阅读天天练</title>
<style>
  :root {
    --primary: #4A90D9;
    --primary-dark: #357ABD;
    --bg: #F5F0E8;
    --card-bg: #FFFFFF;
    --text: #333;
    --border: #DDD;
    --star-color: #FFB300;
    --highlight-bg: #FFF9C4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-top: 60px;
  }

  /* ===== HEADER ===== */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 800;
    background: linear-gradient(135deg, #4A90D9, #7B68EE);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .header h1 { font-size: 24px; font-weight: 700; letter-spacing: 2px; }
  .header-actions { display: flex; gap: 10px; }

  /* ===== BUTTONS ===== */
  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,.15); }
  .btn-primary { background: #fff; color: var(--primary-dark); font-weight: 600; }
  .btn-secondary { background: rgba(255,255,255,.2); color: #fff; }
  .btn-secondary:hover { background: rgba(255,255,255,.35); }
  .btn-star { font-size: 22px; background: none; border: none; cursor: pointer; padding: 4px; transition: transform .2s; }
  .btn-star:hover { transform: scale(1.2); }
  .btn-star.active { animation: starPop .4s ease; }
  @keyframes starPop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }

  /* ===== TOOLBAR (removed, now in settings panel) ===== */

  /* ===== FILE UPLOAD AREA ===== */
  .upload-area {
    max-width: 600px;
    margin: 10px auto 16px;
    padding: 30px 40px;
    text-align: center;
    background: var(--card-bg);
    border: 3px dashed var(--border);
    border-radius: 20px;
    cursor: pointer;
    transition: all .3s;
  }
  .upload-area:hover, .upload-area.dragover {
    border-color: var(--primary);
    background: #EDF4FB;
    transform: scale(1.01);
  }
  .upload-area .icon { font-size: 48px; margin-bottom: 10px; }
  .upload-area h2 { font-size: 20px; color: #555; margin-bottom: 8px; }
  .upload-area p { font-size: 14px; color: #999; }
  .upload-area input[type="file"] { display: none; }
  .paste-area {
    max-width: 600px;
    margin: 8px auto;
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 10px;
    text-align: center;
  }
  .paste-area h3 { font-size: 15px; color: #555; margin-bottom: 10px; }
  .paste-area textarea {
    width: 100%;
    height: 120px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
    resize: vertical;
    box-sizing: border-box;
    font-family: inherit;
    line-height: 1.6;
  }
  .paste-area textarea:focus { outline: none; border-color: var(--primary); }
  .paste-area .paste-btn {
    margin-top: 10px;
    padding: 8px 24px;
    font-size: 14px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background .2s;
  }
  .paste-area .paste-btn:hover { background: var(--primary-dark); }

  /* ===== READER ===== */
  .reader {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px;
    display: none;
  }
  .reader.show { display: block; }
  .reader-content {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
    line-height: 2;
    white-space: pre-wrap;
    word-break: break-all;
    text-align: justify;
    cursor: default;
  }
  .reader-content .para-gap {
    display: block;
    height: 4px;
  }
  .reader-content .char {
    cursor: pointer;
    transition: background .15s, color .15s, border-radius .15s;
    display: inline;
    position: relative;
  }
  .reader-content .char:hover {
    background: rgba(74,144,217,.12);
    border-radius: 2px;
  }
  .reader-content .char.collected {
    font-weight: 900;
    color: #D84315;
    border-bottom: 2px solid #FFB300;
  }
  .reader-content .char.speaking {
    background: rgba(74,144,217,.18);
    border-radius: 2px;
  }

  /* Paragraph speaker icon */
  .para-speaker {
    display: inline-block;
    cursor: pointer;
    opacity: 0.6;
    font-size: 14px;
    vertical-align: middle;
    margin-right: 4px;
    transition: opacity .2s;
    line-height: 2;
    user-select: none;
  }
  .para-speaker:hover {
    opacity: 1;
  }
  .para-speaker.active {
    opacity: 1;
    color: var(--primary-dark);
  }

  /* User switcher buttons */
  .user-btn.active {
    background: linear-gradient(135deg, #4A90D9, #7B68EE) !important;
    color: #fff !important;
    box-shadow: 0 2px 8px rgba(74,144,217,.3);
  }

  /* Paragraph word count and checkbox */
  .para-word-count {
    font-size: 0.6em;
    vertical-align: super;
    color: #999;
    margin-left: 4px;
    user-select: none;
  }
  .para-checkbox {
    display: inline-block;
    width: 16px;
    height: 16px;
    margin-left: 6px;
    vertical-align: middle;
    cursor: pointer;
    accent-color: var(--primary);
  }
  .para-checkbox:checked {
    cursor: default;
  }
  .para-check-date {
    font-size: 0.6em;
    vertical-align: super;
    color: #66BB6A;
    margin-left: 4px;
    user-select: none;
  }
  .para-read-stats {
    font-size: 13px;
    color: #888;
    margin-top: 6px;
  }
  .para-read-stats strong {
    color: var(--primary-dark);
  }

  /* Clickable total read words */
  .total-read-clickable {
    cursor: pointer;
    text-decoration: underline dotted;
    transition: color .2s;
  }
  .total-read-clickable:hover {
    color: var(--primary) !important;
  }

  /* History stats modal */
  .history-modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.45);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    animation: fadeIn .2s;
  }
  .history-modal-overlay.show { display: flex; }

  .history-modal {
    background: var(--card-bg);
    border-radius: 20px;
    width: 420px;
    max-width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    box-shadow: 0 16px 48px rgba(0,0,0,.2);
    animation: slideUp .3s ease;
  }
  @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }

  .history-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--card-bg);
    border-radius: 20px 20px 0 0;
    z-index: 1;
  }
  .history-modal-header h2 {
    font-size: 18px;
    color: #333;
  }
  .history-modal-close {
    font-size: 22px;
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    padding: 2px 6px;
    line-height: 1;
    transition: color .2s;
  }
  .history-modal-close:hover { color: #333; }

  .history-modal-body {
    padding: 16px 24px 24px;
  }

  .history-summary {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: linear-gradient(135deg, #E3F2FD, #E8F5E9);
    border-radius: 12px;
  }
  .history-summary-item {
    flex: 1;
    text-align: center;
  }
  .history-summary-item .num {
    font-size: 24px;
    font-weight: 700;
    color: var(--primary-dark);
  }
  .history-summary-item .label {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }

  .history-day-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .history-day-item:last-child { border-bottom: none; }

  .history-day-date {
    font-size: 14px;
    color: #555;
  }
  .history-day-date .weekday {
    font-size: 12px;
    color: #999;
    margin-left: 8px;
  }

  .history-day-words {
    font-size: 16px;
    font-weight: 600;
    color: var(--primary-dark);
  }

  .history-empty {
    text-align: center;
    padding: 40px 20px;
    color: #999;
    font-size: 14px;
  }

  /* Reading guide */
  .reading-guide {
    margin-top: 20px;
    padding: 16px;
    background: #f9fafb;
    border-radius: 10px;
    border: 1px solid #eef0f2;
  }
  .reading-guide-title {
    font-size: 14px;
    font-weight: 600;
    color: #555;
    margin-bottom: 12px;
  }
  .reading-guide-section {
    margin-bottom: 12px;
  }
  .reading-guide-section:last-child { margin-bottom: 0; }
  .reading-guide-grade {
    font-size: 13px;
    font-weight: 600;
    color: #666;
    margin-bottom: 4px;
  }
  .reading-guide-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-size: 12px;
    color: #888;
    padding: 2px 0 2px 16px;
    line-height: 1.8;
  }
  .reading-guide-row .guide-year {
    flex-shrink: 0;
    width: 48px;
    font-weight: 500;
    color: #777;
  }
  .reading-guide-note {
    font-size: 12px;
    color: #999;
    padding: 4px 0 0 16px;
    font-style: italic;
  }

  /* Word selection highlight */
  .word-selection {
    background: rgba(255, 193, 7, 0.35) !important;
    border-radius: 3px;
    cursor: pointer;
    transition: background .15s;
  }
  .word-selection:hover {
    background: rgba(255, 193, 7, 0.55) !important;
  }

  /* Hover tooltip for collected chars */
  .char-tooltip {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    color: #333;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 18px;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
    box-shadow: 0 2px 10px rgba(0,0,0,.18);
    line-height: 1.5;
    border: 1px solid #e0e0e0;
  }
  .char-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #fff;
  }
  .reader-content .char.collected:hover .char-tooltip { display: block; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.45);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    animation: fadeIn .2s;
  }
  .modal-overlay.show { display: flex; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .modal {
    background: var(--card-bg);
    border-radius: 20px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    box-shadow: 0 16px 48px rgba(0,0,0,.2);
    animation: slideLeft .3s ease;
    position: fixed;
    top: 80px;
    left: 24px;
  }
  @keyframes slideLeft { from{transform:translateX(-30px);opacity:0} to{transform:translateX(0);opacity:1} }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px 12px;
    border-bottom: 1px solid var(--border);
  }
  .modal-header .char-display {
    font-size: 48px;
    font-weight: 700;
    color: var(--primary-dark);
    line-height: 1;
  }
  .modal-header .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal-header .star-btn {
    font-size: 28px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    transition: transform .25s;
  }
  .modal-header .star-btn:hover { transform: scale(1.25); }
  .modal-header .star-btn.active { color: var(--star-color); }

  .modal-close {
    font-size: 24px;
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    padding: 4px;
    transition: color .2s;
  }
  .modal-close:hover { color: #333; }

  .modal-body { padding: 16px 24px 24px; }

  .modal-section {
    margin-bottom: 16px;
  }
  .modal-section h3 {
    font-size: 14px;
    color: #888;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .modal-section p {
    font-size: 16px;
    line-height: 1.8;
  }
  .modal-section .pinyin {
    font-size: 28px;
    color: var(--primary-dark);
    font-weight: 600;
    letter-spacing: 4px;
  }

  /* Stroke canvas */
  .stroke-controls {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
  }
  .stroke-controls .btn { font-size: 13px; padding: 6px 14px; }

  .modal-section .ai-tips {
    background: linear-gradient(135deg, #E8F5E9, #FFF8E1);
    border-left: 4px solid #66BB6A;
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    font-size: 15px;
    line-height: 1.8;
    color: #555;
  }
  .modal-section .ai-tips::before {
    content: '💡 ';
  }

  .modal-section textarea {
    width: 100%;
    min-height: 80px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    transition: border-color .2s;
  }
  .modal-section textarea:focus {
    outline: none;
    border-color: var(--primary);
  }

  .loading-hint {
    text-align: center;
    padding: 12px;
    color: #999;
    font-size: 14px;
  }

  /* ===== COLLECTIONS PANEL ===== */
  .collections-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.4);
    z-index: 900;
    animation: fadeIn .2s;
  }
  .collections-overlay.show { display: block; }

  .collections-panel {
    position: fixed;
    top: 0; right: -420px;
    width: 400px;
    max-width: 90vw;
    height: 100vh;
    background: var(--card-bg);
    box-shadow: -4px 0 20px rgba(0,0,0,.15);
    z-index: 901;
    transition: right .3s ease;
    display: flex;
    flex-direction: column;
  }
  .collections-panel.show { right: 0; }

  .collections-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .collections-header h2 { font-size: 18px; margin: 0; }
  .col-filter-wrap {
    position: relative;
    display: inline-block;
    margin-left: 8px;
  }
  .col-filter-btn {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: #888;
    padding: 2px 4px;
    vertical-align: middle;
  }
  .col-filter-btn:hover { color: var(--primary-dark); }
  .col-filter-btn .filter-arrow {
    font-size: 12px;
    transition: transform .2s;
  }
  .col-filter-btn .filter-arrow.open { transform: rotate(180deg); }
  .col-filter-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
    padding: 6px 0;
    z-index: 910;
    min-width: 120px;
  }
  .col-filter-dropdown.show { display: block; }
  .col-filter-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    font-size: 14px;
    cursor: pointer;
    color: #333;
    white-space: nowrap;
  }
  .col-filter-option:hover { background: #F0F4FF; }
  .col-filter-option.active { color: var(--primary-dark); font-weight: 600; }
  .col-filter-option .mastery-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .collections-body {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 12px 16px;
  }
  .collection-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 10px;
    transition: background .2s;
    border-bottom: 1px solid #f0f0f0;
  }
  .collection-item:hover { background: #F5F5F5; }
  .collection-item .col-char {
    font-size: 32px;
    font-weight: 700;
    color: var(--primary-dark);
    min-width: 44px;
    text-align: center;
  }
  .collection-item .col-info { flex: 1; }
  .collection-item .col-pinyin { font-size: 16px; color: #666; }
  .collection-item .col-note {
    font-size: 13px;
    color: #999;
    margin-top: 4px;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .collection-item .col-del {
    background: none;
    border: none;
    font-size: 18px;
    color: #CCC;
    cursor: pointer;
    padding: 4px;
    transition: color .2s;
  }
  .collection-item .col-del:hover { color: #E53935; }

  /* Mastery level control */
  .col-mastery {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 15px;
    color: #666;
    margin-right: 8px;
  }
  .col-mastery-btn {
    background: none;
    border: 1px solid #ddd;
    border-radius: 6px;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    color: #666;
    transition: all .15s;
    flex-shrink: 0;
  }
  .col-mastery-btn:hover { background: #f0f0f0; border-color: #bbb; }
  .col-mastery-btn:active { background: #e0e0e0; }
  .col-mastery-val {
    font-weight: 700;
    font-size: 16px;
    min-width: 18px;
    text-align: center;
  }
  .mastery-1 { color: #E53935; }
  .mastery-2 { color: #F4511E; }
  .mastery-3 { color: #FF9800; }
  .mastery-4 { color: #FFC107; }
  .mastery-5 { color: #CDDC39; }
  .mastery-6 { color: #8BC34A; }
  .mastery-7 { color: #4CAF50; }
  .mastery-8 { color: #009688; }
  .mastery-9 { color: #2196F3; }

  .collections-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }

  .empty-hint {
    text-align: center;
    padding: 40px 20px;
    color: #BBB;
    font-size: 15px;
  }

  /* ===== SETTINGS PANEL ===== */
  .settings-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.4);
    z-index: 900;
    animation: fadeIn .2s;
  }
  .settings-overlay.show { display: block; }
  .settings-panel {
    position: fixed;
    top: 0; right: -420px;
    width: 340px;
    max-width: 90vw;
    height: 100vh;
    background: var(--card-bg);
    box-shadow: -4px 0 20px rgba(0,0,0,.15);
    z-index: 901;
    transition: right .3s ease;
    display: flex;
    flex-direction: column;
  }
  .settings-panel.show { right: 0; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #CCC; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #AAA; }

  /* ===== ARTICLE LIST ===== */
  .article-list {
    max-width: 600px;
    margin: 0 auto 40px;
    padding: 0 24px;
  }
  .article-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card-bg);
    border-radius: 12px;
    margin-bottom: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    transition: box-shadow .2s;
    cursor: pointer;
  }
  .article-item:hover { box-shadow: 0 3px 12px rgba(0,0,0,.1); }
  .article-item .art-icon { font-size: 24px; flex-shrink: 0; }
  .article-item .art-info { flex: 1; min-width: 0; }
  .article-item .art-name {
    font-size: 15px;
    color: #333;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

<script>
// ============================================================
//  STATE
// ============================================================
let collections = {};        // { "字": { pinyin, note } }
let colMasteryFilter = 0;     // 0 = 全部, 1-9 = 筛选对应掌握度
let currentChar = '';
let rawText = '';
let speechVoices = [];
let lastReadStartIndex = -1;  // index in rawText where the last clicked char's paragraph starts
let justSelectedWord = false; // flag to prevent click from clearing selection immediately

const DB_VERSION = 4;
const DB_STORE = 'articles';
let currentUser = 'user1'; // 'user1' or 'user2'
let currentArticleName = '';
let paraReadRecords = {}; // { "articleName::paraIndex": { wordCount, date: "YYYY-MM-DD" } }

function getDBName() {
  return 'PDJReadingDB_' + currentUser;
}

// ============================================================
//  INDEXEDDB HELPERS
// ============================================================
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(getDBName(), DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      const oldVersion = e.oldVersion;
      if (oldVersion < 1) {
        if (!db.objectStoreNames.contains('articles')) {
          db.createObjectStore('articles', { keyPath: 'name' });
        }
      }
      if (oldVersion < 2) {
        if (!db.objectStoreNames.contains('collections')) {
          db.createObjectStore('collections', { keyPath: 'char' });
        }
        if (!db.objectStoreNames.contains('settings')) {
          db.createObjectStore('settings', { keyPath: 'id' });
        }
      }
      if (oldVersion < 3) {
        if (!db.objectStoreNames.contains('para_read')) {
          db.createObjectStore('para_read', { keyPath: 'id' });
        }
      }
      if (oldVersion < 4) {
        if (!db.objectStoreNames.contains('scroll_pos')) {
          db.createObjectStore('scroll_pos', { keyPath: 'id' });
        }
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function dbPut(storeName, data) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).put(data);
    tx.oncomplete = resolve;
    tx.onerror = e => reject(e.target.error);
  });
}

async function dbGet(storeName, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function dbGetAll(storeName) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function dbDelete(storeName, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).delete(key);
    tx.oncomplete = resolve;
    tx.onerror = e => reject(e.target.error);
  });
}

async function dbSaveArticle(name, content) {
  return dbPut(DB_STORE, { name, content, time: Date.now() });
}

async function dbDeleteArticle(name) {
  return dbDelete(DB_STORE, name);
}

// ============================================================
//  PARAGRAPH READ RECORDS
// ============================================================
function getParaRecordId(articleName, paraIndex) {
  return articleName + '::' + paraIndex;
}

function getTodayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

async function loadParaReadRecords() {
  try {
    const all = await dbGetAll('para_read');
    paraReadRecords = {};
    for (const rec of all) {
      paraReadRecords[rec.id] = { wordCount: rec.wordCount, date: rec.date };
    }
  } catch(e) { console.error('Load para read records failed:', e); }
}

async function saveParaReadRecord(articleName, paraIndex, wordCount) {
  const id = getParaRecordId(articleName, paraIndex);
  const date = getTodayStr();
  const record = { id, wordCount, date };
  try {
    await dbPut('para_read', record);
    paraReadRecords[id] = { wordCount, date };
  } catch(e) { console.error('Save para read record failed:', e); }
}

function getParaReadRecord(articleName, paraIndex) {
  const id = getParaRecordId(articleName, paraIndex);
  return paraReadRecords[id] || null;
}

function countWordsWithoutPunctuation(text) {
  // Remove punctuation and whitespace, count remaining characters
  // CJK chars count as 1 each, English words count as 1 each
  let count = 0;
  // Count CJK characters
  const cjkMatch = text.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g);
  if (cjkMatch) count += cjkMatch.length;
  // Count English words (sequences of letters)
  const enWords = text.match(/[a-zA-Z]+/g);
  if (enWords) count += enWords.length;
  return count;
}

function getTodayReadWords() {
  const today = getTodayStr();
  let total = 0;
  for (const id in paraReadRecords) {
    if (paraReadRecords[id].date === today) {
      total += paraReadRecords[id].wordCount;
    }
  }
  return total;
}

function getTotalReadWords() {
  let total = 0;
  for (const id in paraReadRecords) {
    total += paraReadRecords[id].wordCount;
  }
  return total;
}

function updateReadStatsDisplay() {
  const todayWords = getTodayReadWords();
  const totalWords = getTotalReadWords();
  const todayEl = document.getElementById('todayReadWords');
  const totalEl = document.getElementById('totalReadWords');
  if (todayEl) todayEl.textContent = todayWords;
  if (totalEl) totalEl.textContent = totalWords;
}

function getDailyReadStats() {
  const daily = {};
  for (const id in paraReadRecords) {
    const record = paraReadRecords[id];
    if (!daily[record.date]) {
      daily[record.date] = 0;
    }
    daily[record.date] += record.wordCount;
  }
  // Sort by date descending
  const sorted = Object.entries(daily).sort((a, b) => b[0].localeCompare(a[0]));
  return sorted;
}

let scrollSaveTimer = null;

  if (!currentArticleName) return;
  dbPut('scroll_pos', { id: currentArticleName, scrollY: window.scrollY });
}

function restoreScrollPos(articleName) {
  return dbGet('scroll_pos', articleName).then(record => {

  }).catch(() => {});
}

}

async function openArticle(name) {
  const db = await openDB();
  const tx = db.transaction(DB_STORE, 'readonly');
  const req = tx.objectStore(DB_STORE).get(name);
  req.onsuccess = () => {
    if (!req.result) return;
    rawText = req.result.content;
    currentArticleName = name;
    renderText(rawText);
    document.getElementById('uploadArea').style.display = 'none';
    document.getElementById('pasteArea').style.display = 'none';
    document.getElementById('articleList').style.display = 'none';
    document.getElementById('userSwitcher').style.display = 'none';
    document.getElementById('reader').classList.add('show');
    document.getElementById('headerHomeBtn').style.display = '';
    document.getElementById('headerEditBtn').style.display = '';
    restoreScrollPos(name);
  };
}

async function deleteArticle(name) {
  await dbDeleteArticle(name);
  dbDelete('scroll_pos', name).catch(() => {});
  renderArticleList();
}

async function copyArticleToClipboard(name) {
  const db = await openDB();
  const tx = db.transaction(DB_STORE, 'readonly');
  const req = tx.objectStore(DB_STORE).get(name);
  req.onsuccess = () => {
    if (!req.result) return;
    const text = req.result.content;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => showToast('文章已复制到剪贴板')).catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  };
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('文章已复制到剪贴板');
  } catch (err) {
    showToast('复制失败');
  }
  document.body.removeChild(ta);
}

function showToast(msg) {
  let toast = document.getElementById('globalToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'globalToast';
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

(async function init() {
  await loadCollections();
  renderCollections();
  await loadSettings();
  await loadParaReadRecords();
  updateReadStatsDisplay();
  await renderArticleList();

  // Load speech voices
  if (window.speechSynthesis) {
    loadSpeechVoices();
    window.speechSynthesis.addEventListener('voiceschanged', loadSpeechVoices);
  }

  // Drag & drop
  const area = document.getElementById('uploadArea');
  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('dragover'); });
  area.addEventListener('dragleave', () => area.classList.remove('dragover'));
  area.addEventListener('drop', e => {
    e.preventDefault();
    area.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });

  // Text selection (划词选字)
  document.getElementById('readerContent').addEventListener('mouseup', e => {
    if (isEditMode) return;
    handleTextSelection(e);
  });

  // Click blank area to stop read aloud / clear word selection
  document.getElementById('readerContent').addEventListener('click', e => {
    // In edit mode, do nothing (allow normal text cursor)
    if (isEditMode) return;
    // Skip clearing if a word was just selected (mouseup -> click sequence)
    if (justSelectedWord) {
      justSelectedWord = false;
      return;
    }
    if (!e.target.classList.contains('word-selection')) {
      clearWordSelection();
    }
    if (isReadAloud && !e.target.classList.contains('char') && !e.target.classList.contains('para-speaker')) {
      stopReadAloud();
    }
  });
  // Prevent pinch-zoom and double-tap zoom on mobile
  document.addEventListener('touchmove', function(e) {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function(e) {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, false);
  document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
  document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
  document.addEventListener('gestureend', function(e) { e.preventDefault(); });

  startScrollTracking();
})();

    const name = file.name.replace(/\.txt$/i, '');

    await dbSaveArticle(name, rawText);

function toggleEditMode() {
  if (isEditMode) {
    exitEditMode();
  } else {
    enterEditMode();
  }
}

function enterEditMode() {
  isEditMode = true;
  if (isReadAloud) stopReadAloud();
  const container = document.getElementById('readerContent');
  // Record scroll position before editing
  container._scrollTopBeforeEdit = window.scrollY;
  container._containerScrollBeforeEdit = container.scrollTop;
  // Store current raw text for comparison
  container.setAttribute('contenteditable', 'true');
  // Switch to plain text editing: fill with rawText
  container.innerText = rawText;
  // Restore container scroll
  container.scrollTop = container._containerScrollBeforeEdit;
  container.style.outline = '2px solid #4A90D9';
  container.style.borderRadius = '16px';
  // Update button text
  document.getElementById('headerEditBtn').textContent = '💾';
  document.getElementById('headerEditBtn').title = '保存';
  document.getElementById('headerEditBtn').style.background = '#4CAF50';
  document.getElementById('headerEditBtn').style.color = '#fff';
}

function exitEditMode() {
  const container = document.getElementById('readerContent');
  // Get saved scroll position
  const savedWindowScroll = container._scrollTopBeforeEdit || 0;
  const savedContainerScroll = container._containerScrollBeforeEdit || 0;
  // Get edited text
  const newText = container.innerText;
  container.removeAttribute('contenteditable');
  container.style.outline = '';
  isEditMode = false;

  // Restore button
  document.getElementById('headerEditBtn').textContent = '✏';
  document.getElementById('headerEditBtn').title = '编辑';
  document.getElementById('headerEditBtn').style.background = '';
  document.getElementById('headerEditBtn').style.color = '';

  // Check if text changed
  if (newText !== rawText) {
    rawText = newText;
    // Re-render with char spans
    renderText(rawText);
    // Save to database
    if (currentArticleName) {
      dbSaveArticle(currentArticleName, rawText);
    }
  } else {
    // No change, just re-render to restore char spans
    renderText(rawText);
  }
  // Restore scroll position to exactly where it was before editing
  container.scrollTop = savedContainerScroll;
  window.scrollTo(0, savedWindowScroll);
}

// ============================================================
//  TEXT RENDER
// ============================================================
function renderText(text) {
  const container = document.getElementById('readerContent');
  // Split into paragraphs for speaker icons
  const paragraphs = text.split(/\n/);
  let html = '';
  let rawIdx = 0; // track position in rawText
  let paraIndex = 0; // actual paragraph index (skipping empty lines)

  for (let p = 0; p < paragraphs.length; p++) {
    const para = paragraphs[p];

    // Empty line = line break
    if (para.trim().length === 0) {
      html += '<span class="para-gap"></span>';
      rawIdx += para.length + 1; // +1 for the \n
      continue;
    }

    const currentParaIdx = paraIndex;
    paraIndex++;

    // Add paragraph speaker icon
    const paraStartRawIdx = rawIdx;
    html += `<span class="para-speaker" data-para-start="${paraStartRawIdx}" onclick="readFromPara(${paraStartRawIdx})" title="从此段开始朗读">🔈</span>`;

    // Render characters in this paragraph
    for (let i = 0; i < para.length; i++) {
      const ch = para[i];
      rawIdx++;
      if (ch === ' ' || ch === '\t' || ch === '\r') {
        html += ch;
      } else {
        const isCJK = /[\u4e00-\u9fff\u3400-\u4dbf]/.test(ch);
        if (isCJK) {
          const isCollected = collections[ch];
          html += `<span class="char${isCollected ? ' collected' : ''}" data-char="${ch}" data-raw-idx="${rawIdx - 1}" onclick="openCharModal(this)">${ch}`;
          if (isCollected) {
            const pinyin = collections[ch].pinyin || '';
            const note = collections[ch].note || '';
            let tip = pinyin;
            if (note) tip += ' | ' + note;
            html += `<span class="char-tooltip">${escapeHtml(tip)}</span>`;
          }
          html += '</span>';
        } else {
          html += escapeHtml(ch);
        }
      }
    }

    // Add word count (superscript, small font)
    const wordCount = countWordsWithoutPunctuation(para);
    html += `<span class="para-word-count">${wordCount}字</span>`;

    // Add checkbox with date as title
    const record = getParaReadRecord(currentArticleName, currentParaIdx);
    const isChecked = record ? 'checked disabled' : '';
    const dateTitle = record ? ` title="${record.date} 已读"` : '';
    html += `<input type="checkbox" class="para-checkbox" data-para-index="${currentParaIdx}" data-word-count="${wordCount}" ${isChecked}${dateTitle} onchange="onParaCheckboxChange(this)">`;

    // Add line break after paragraph (unless last)
    if (p < paragraphs.length - 1) {
      html += '<span class="para-gap"></span>';
      rawIdx++; // for the \n
    }
  }
  container.innerHTML = html;

  // Highlight collected multi-char words in the text
  highlightCollectedWords();
}

async function onParaCheckboxChange(checkbox) {
  if (!checkbox.checked) {
    // Prevent unchecking - re-check it
    checkbox.checked = true;
    return;
  }
  const paraIndex = parseInt(checkbox.dataset.paraIndex);
  const wordCount = parseInt(checkbox.dataset.wordCount);

  // Check if there are unread paragraphs before this one
  const allCheckboxes = document.querySelectorAll('.para-checkbox');
  const unreadBefore = [];
  allCheckboxes.forEach(cb => {
    const idx = parseInt(cb.dataset.paraIndex);
    if (idx < paraIndex && !cb.checked) {
      unreadBefore.push(cb);
    }
  });

  if (unreadBefore.length > 0) {
    const confirmed = confirm('是否将此段前所有未读段落都标记为已读？\n选择"取消"则只标记当前段。');
    if (confirmed) {
      for (const cb of unreadBefore) {
        const idx = parseInt(cb.dataset.paraIndex);
        const wc = parseInt(cb.dataset.wordCount);
        cb.checked = true;
        cb.disabled = true;
        cb.title = getTodayStr() + ' 已读';
        await saveParaReadRecord(currentArticleName, idx, wc);
      }
    }
  }

  // Save current paragraph record
  await saveParaReadRecord(currentArticleName, paraIndex, wordCount);

  // Disable checkbox (cannot uncheck) and set date title
  checkbox.disabled = true;
  checkbox.title = getTodayStr() + ' 已读';

  // Update stats display
  updateReadStatsDisplay();
}

function highlightCollectedWords() {
  const wordKeys = Object.keys(collections).filter(k => k.length > 1);
  if (wordKeys.length === 0) return;

  const chars = document.querySelectorAll('#readerContent .char');
  if (chars.length === 0) return;

  // Build a mapping of char index -> DOM element
  const charList = Array.from(chars);
  const text = charList.map(span => span.dataset.char).join('');

  for (const word of wordKeys) {
    let idx = 0;
    while ((idx = text.indexOf(word, idx)) !== -1) {
      for (let i = 0; i < word.length; i++) {
        charList[idx + i].classList.add('collected');
      }
      idx += 1; // find next occurrence
    }
  }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
//  CHARACTER MODAL
// ============================================================
function openCharModal(el) {
  // In edit mode, do not open char modal
  if (isEditMode) return;
  // Support both DOM element and plain char string
  let ch, isElement = false;
  if (typeof el === 'string') {
    ch = el;
  } else {
    ch = el.dataset.char;
    isElement = true;
  }
  if (!ch) return;

  // If this char is part of a word selection, open word modal instead
  if (isElement && el.classList.contains('word-selection') && el.dataset.selectedWord) {
    openWordModal(el.dataset.selectedWord);
    return;
  }

  currentChar = ch;

  // Find paragraph start index in rawText (only when clicking from reader)
  if (isElement && rawText) {
    const allChars = document.querySelectorAll('#readerContent .char');
    const charIndex = Array.from(allChars).indexOf(el);
    if (charIndex >= 0) {
      let domIdx = 0;
      for (let i = 0; i < rawText.length; i++) {
        if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(rawText[i])) {
          if (domIdx === charIndex) {
            let paraStart = i;
            while (paraStart > 0 && rawText[paraStart - 1] !== '\n') paraStart--;
            while (paraStart < rawText.length && (rawText[paraStart] === ' ' || rawText[paraStart] === '\t')) paraStart++;
            lastReadStartIndex = paraStart;
            break;
          }
          domIdx++;
        }
      }
    }
  }

  document.getElementById('modalChar').textContent = ch;
  document.getElementById('modalNotes').value = collections[ch] ? (collections[ch].note || '') : '';

  // Star state
  const starBtn = document.getElementById('modalStar');
  starBtn.textContent = collections[ch] ? '★' : '☆';
  starBtn.className = 'star-btn' + (collections[ch] ? ' active' : '');

  // Show loading
  document.getElementById('modalPinyin').textContent = '加载中...';
  document.getElementById('modalDefinition').textContent = '加载中...';
  document.getElementById('modalWords').textContent = '加载中...';
  document.getElementById('modalAiTips').textContent = '加载中...';

  // Load stroke animation
  loadStrokeAnimation(ch);

  document.getElementById('modalOverlay').classList.add('show');

  // Fetch data from dictionary API
  fetchCharInfo(ch);

  // Auto-read after 1s
  setTimeout(() => {
    if (currentChar === ch) speakSingleChar(ch);
  }, 1000);
}

function clearWordSelection() {
  document.querySelectorAll('#readerContent .word-selection').forEach(el => {
    el.classList.remove('word-selection');
    el.removeAttribute('data-selected-word');
  });
}

function handleTextSelection(e) {
  const selection = window.getSelection();
  if (!selection || selection.isCollapsed || selection.rangeCount === 0) return;

  const selectedText = selection.toString().trim();
  // Filter only CJK chars
  const cjkText = selectedText.replace(/[^\u4e00-\u9fff\u3400-\u4dbf]/g, '');
  if (cjkText.length < 2) return;

  // Clear previous selection highlight
  clearWordSelection();

  // Find all .char spans within the selection range
  const range = selection.getRangeAt(0);
  const chars = [];
  // Walk through all char spans in readerContent and check if inside range
  document.querySelectorAll('#readerContent .char').forEach(span => {
    const spanRange = document.createRange();
    spanRange.selectNodeContents(span);
    // Check overlap
    const isBefore = range.compareBoundaryPoints(Range.START_TO_END, spanRange) < 0;
    const isAfter = range.compareBoundaryPoints(Range.END_TO_START, spanRange) > 0;
    if (!isBefore && !isAfter) {
      chars.push(span);
    }
  });

  if (chars.length < 2) return;

  // Highlight and attach click handler
  chars.forEach(span => {
    span.classList.add('word-selection');
    span.dataset.selectedWord = cjkText;
  });

  // Clear native selection
  selection.removeAllRanges();

  // Mark that a word was just selected so the upcoming click event
  // knows not to clear the highlight immediately
  justSelectedWord = true;

  // Prevent the click event from opening single-char modal immediately
  // (the click will be handled by the .word-selection handler instead)
  e.stopPropagation();
}

async function fetchWordInfo(word) {
  let pinyin = '';

  // Priority 1: local pinyin-pro
  try {
    if (window.pinyinPro && typeof window.pinyinPro.pinyin === 'function') {
      pinyin = window.pinyinPro.pinyin(word) || '';
    }
  } catch (e) {}

  // Try moedict for word definition (moedict supports multi-char entries)
  let defText = '';
  try {
    const res = await fetch(`https://www.moedict.tw/raw/${encodeURIComponent(word)}`);
    if (res.ok) {
      const data = await res.json();
      const defs = data.heteronyms && data.heteronyms[0] && data.heteronyms[0].definitions;
      if (defs && defs.length) {
        defs.forEach((d, i) => {
          if (d.type) defText += `【${d.type}】`;
          defText += d.def;
          if (d.example) defText += `\n例：${d.example}`;
          if (i < defs.length - 1) defText += '\n';
        });
      }
      // Use online pinyin if local missing
      if (!pinyin) {
        pinyin = (data.heteronyms && data.heteronyms[0] && data.heteronyms[0].pinyin) || '';
      }
    }
  } catch (err) {
    console.error('Word dictionary fetch error:', err);
  }

  // Fallback: query each char separately
  if (!defText) {
    const charDefs = [];
    for (const ch of word) {
      if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(ch)) {
        try {
          const res = await fetch(`https://www.moedict.tw/raw/${encodeURIComponent(ch)}`);
          if (res.ok) {
            const data = await res.json();
            const defs = data.heteronyms && data.heteronyms[0] && data.heteronyms[0].definitions;
            if (defs && defs.length) {
              const firstDef = defs[0];
              let d = firstDef.def;
              if (firstDef.type) d = `【${firstDef.type}】${d}`;
              charDefs.push(`${ch}：${d}`);
            }
          }
        } catch (e) {}
      }
    }
    if (charDefs.length) {
      defText = charDefs.join('\n');
    }
  }

  // Fallback pinyin
  if (!pinyin) {
    try {
      const pyRes = await fetch(`https://pinyinapi.sstration.cn/api/v1/pinyin/${encodeURIComponent(word)}`);
      if (pyRes.ok) {
        const pyData = await pyRes.json();
        if (pyData && pyData.pinyin) pinyin = pyData.pinyin;
      }
    } catch (e) {}
  }

  document.getElementById('modalPinyin').textContent = pinyin || '未知';
  document.getElementById('modalDefinition').textContent = defText || '暂无释义';
  document.getElementById('modalWords').textContent = '（组词功能待补充）';

  // AI Tips: generate mnemonic for the whole word
  const tips = generateMnemonic(word);
  document.getElementById('modalAiTips').textContent = tips;

  // Auto-collect (respect user setting)
  const autoCollect = document.getElementById('autoCollectCheckbox');
  if (pinyin && autoCollect && autoCollect.checked) {
    autoCollectChar(word, pinyin);
  }
}

// ============================================================
//  READ ALOUD
// ============================================================
let isReadAloud = false;
let isEditMode = false;
let readAloudTimer = null;
let lastSpeakingEl = null;

function clearSpeakingHighlight() {
  document.querySelectorAll('#readerContent .char.speaking').forEach(el => {
    el.classList.remove('speaking');
  });
  lastSpeakingEl = null;
}

function highlightCharAtRawIdx(idx) {
  clearSpeakingHighlight();
  if (idx < 0 || idx >= rawText.length) return;
  const el = document.querySelector(`#readerContent .char[data-raw-idx="${idx}"]`);
  if (el) {
    el.classList.add('speaking');
    // Only scroll when the element is outside the visible viewport
    const rect = el.getBoundingClientRect();
    const viewH = window.innerHeight;
    if (rect.top < 80 || rect.bottom > viewH - 40) {
      el.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
    lastSpeakingEl = el;
  }
}

// Move to the next CJK char in rawText starting from idx (inclusive)
function nextCjkIdx(idx) {
  let i = idx;
  while (i < rawText.length) {
    if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(rawText[i])) return i;
    i++;
  }
  return -1;
}

// Split a paragraph text into sentence segments by punctuation
// Returns array of {start, end, text} where start/end are offsets within paraText
function splitIntoSentences(paraText) {
  const segments = [];
  let segStart = 0;
  for (let i = 0; i < paraText.length; i++) {
    const ch = paraText[i];
    // After a punctuation mark, end the current segment (include the punctuation)
    if (/[，。、；：！？,.;?!;:…—·\u3001\uff01\uff0c\u3002\uff1b\uff1f\uff1a]/.test(ch)) {
      segments.push({ start: segStart, end: i + 1, text: paraText.substring(segStart, i + 1) });
      segStart = i + 1;
    }
  }
  // Remaining text after last punctuation
  if (segStart < paraText.length) {
    segments.push({ start: segStart, end: paraText.length, text: paraText.substring(segStart) });
  }
  return segments;
}

// Highlight all .char elements within a sentence range [segStart, segEnd) in rawText coordinates
function highlightSentenceAtRawRange(rawStart, rawEnd) {
  clearSpeakingHighlight();
  // Find the first char element inside the range and the last, then highlight all between
  const allChars = document.querySelectorAll('#readerContent .char');
  let firstInRange = null;
  let lastInRange = null;
  for (const el of allChars) {
    const idx = parseInt(el.dataset.rawIdx);
    if (idx >= rawStart && idx < rawEnd) {
      if (!firstInRange) firstInRange = el;
      el.classList.add('speaking');
      lastInRange = el;
    }
  }
  // Scroll to the first highlighted element
  if (firstInRange) {
    const rect = firstInRange.getBoundingClientRect();
    const viewH = window.innerHeight;
    if (rect.top < 80 || rect.bottom > viewH - 40) {
      firstInRange.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
    lastSpeakingEl = firstInRange;
  }
}

function toggleReadAloud() {
  if (!window.speechSynthesis) { alert('您的浏览器不支持语音朗读'); return; }

  if (isReadAloud) {
    stopReadAloud();
    return;
  }

  if (!rawText) { alert('请先导入文件'); return; }

  // Determine start position
  let startIdx = 0;
  if (lastReadStartIndex >= 0 && lastReadStartIndex < rawText.length) {
    startIdx = lastReadStartIndex;
  }

  // Split text into paragraphs from startIdx
  const remaining = rawText.substring(startIdx);
  const paragraphs = remaining.split(/\n+/).filter(p => p.trim().length > 0);

  if (paragraphs.length === 0) { alert('没有可朗读的内容'); return; }

  isReadAloud = true;

  const lang = document.getElementById('speechLangSelect').value;
  const rate = parseFloat(document.getElementById('speechRateRange').value);
  const voiceName = document.getElementById('speechVoiceSelect').value;

  let paraIdx = 0;
  let paraRawStart = startIdx;
  // Sentence-level highlight state
  let sentences = [];
  let sentIdx = 0;

  function startHighlightTimer(paraText) {
    // Split paragraph into sentence segments
    sentences = splitIntoSentences(paraText);
    sentIdx = 0;
    if (sentences.length > 0) {
      highlightSentenceAtRawRange(
        paraRawStart + sentences[0].start,
        paraRawStart + sentences[0].end
      );
    }
  }

  function advanceToNextSentence(rawIdx) {
    // Find the next sentence whose start is >= rawIdx
    for (let i = 0; i < sentences.length; i++) {
      const s = sentences[i];
      const sRawStart = paraRawStart + s.start;
      const sRawEnd = paraRawStart + s.end;
      if (sRawStart >= rawIdx) {
        sentIdx = i;
        highlightSentenceAtRawRange(sRawStart, sRawEnd);
        return;
      }
      // If rawIdx falls within this sentence, highlight it and move to next
      if (rawIdx >= sRawStart && rawIdx < sRawEnd) {
        sentIdx = i;
        highlightSentenceAtRawRange(sRawStart, sRawEnd);
        return;
      }
    }
    // If no sentence found ahead, highlight the last one
    if (sentences.length > 0) {
      const last = sentences[sentences.length - 1];
      sentIdx = sentences.length - 1;
      highlightSentenceAtRawRange(paraRawStart + last.start, paraRawStart + last.end);
    }
  }

  function stopHighlightTimer() {
    // No interval to clear anymore
  }

  function speakNextPara() {
    if (!isReadAloud || paraIdx >= paragraphs.length) {
      stopReadAloud();
      return;
    }

    setActiveParaSpeaker(paraRawStart);

    const text = paragraphs[paraIdx].trim();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang;
    utt.rate = rate;
    utt.pitch = 1;
    if (voiceName) {
      const voice = speechVoices.find(v => v.name === voiceName);
      if (voice) utt.voice = voice;
    }

    // Use boundary event to advance sentence highlight when TTS reaches a word boundary
    utt.onboundary = (e) => {
      if (e.name === 'word' && e.charIndex >= 0) {
        const rawIdx = paraRawStart + e.charIndex;
        advanceToNextSentence(rawIdx);
      }
    };

    utt.onend = () => {
      stopHighlightTimer();
      clearSpeakingHighlight();

      const mode = document.getElementById('speechModeSelect').value;
      const pauseSec = parseFloat(document.getElementById('speechPauseRange').value);

      if (mode === 'loop') {
        // Repeat current paragraph
        if (isReadAloud) {
          readAloudTimer = setTimeout(speakNextPara, pauseSec * 1000);
        }
      } else if (mode === 'single') {
        stopReadAloud();
      } else {
        // continuous: advance to next paragraph
        paraIdx++;
        paraRawStart += text.length;
        while (paraRawStart < rawText.length && (rawText[paraRawStart] === '\n' || rawText[paraRawStart] === '\r')) {
          paraRawStart++;
        }
        if (paraIdx < paragraphs.length && isReadAloud) {
          readAloudTimer = setTimeout(speakNextPara, pauseSec * 1000);
        } else {
          stopReadAloud();
        }
      }
    };
    utt.onerror = () => { stopReadAloud(); };

    // Start highlight timer
    startHighlightTimer(text);
    window.speechSynthesis.speak(utt);
  }

  speakNextPara();
}

function stopReadAloud() {
  isReadAloud = false;
  if (readAloudTimer) { clearTimeout(readAloudTimer); readAloudTimer = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  clearSpeakingHighlight();
  clearActiveParaSpeaker();
}

    if (res.ok) {

      if (!pinyin) {
        pinyin = (data.heteronyms && data.heteronyms[0] && data.heteronyms[0].pinyin) || '';
      }
      defs = data.heteronyms && data.heteronyms[0] && data.heteronyms[0].definitions;

          if (d.type) defText += `【${d.type}】`;

  // Fallback: online pinyin-only API

  // Simple AI-style mnemonic generation based on character structure
  const tips = generateMnemonic(char);
  document.getElementById('modalAiTips').textContent = tips;

function generateMnemonic(char) {
  const code = char.charCodeAt(0);

  // Common radicals and their meanings
  const radicalMap = {
    '亻': '人', '彳': '行走', '氵': '水', '火': '火', '土': '土',
    '艹': '草', '木': '树', '口': '口', '扌': '手', '女': '女',
    '月': '月/肉', '日': '日', '目': '眼', '足': '脚', '石': '石',
    '山': '山', '雨': '雨', '风': '风', '心': '心', '金': '金',
    '饣': '食', '纟': '丝', '虫': '虫', '辶': '行走', '阝': '土丘',
    '门': '门', '鸟': '鸟', '鱼': '鱼', '马': '马', '车': '车'
  };

  // Left/right radical extraction (simplified)
  let tip = `"${char}"字的记忆小技巧：\n`;

  // Try to decompose
  if (char.length === 1) {
    // Check if it looks like a simple character
    if (code < 0x4E00 || code > 0x9FFF) {
      tip += `这个字符比较特别，不属于常用汉字范围。`;
      return tip;
    }
    tip += `这个字的部首可以从字形结构来理解。`;
    tip += `\n试着联想它的形状和意思之间的联系。`;
    tip += `\n多写几遍、多读几遍，加深印象！`;
  }

  return tip;
}

  document.getElementById('colCount').textContent = allKeys.length;

  if (allKeys.length === 0) {
    body.innerHTML = '<div class="empty-hint">还没有收藏任何字/词<br>阅读时点击汉字或划词即可收藏</div>';
    return;
  }

  // Apply mastery filter
  let keys = allKeys;
  if (colMasteryFilter > 0) {
    keys = allKeys.filter(ch => (collections[ch].mastery || 5) === colMasteryFilter);
  }

  if (keys.length === 0) {
    body.innerHTML = `<div class="empty-hint">没有掌握度为 ${colMasteryFilter} 的字/词<br>点击下拉箭头切换筛选条件</div>`;
    return;
  }

  let html = '';
  keys.reverse();
  keys.forEach(ch => {
    const item = collections[ch];
    const isWord = ch.length > 1;
    const dblClick = isWord
      ? `openWordModal('${escapeHtml(ch)}')`
      : `openCharModal('${escapeHtml(ch)}')`;
    html += `<div class="collection-item" onclick="toggleCollectionDetail(this)" ondblclick="event.preventDefault();${dblClick}">
      <span class="col-char" style="cursor:pointer;">${escapeHtml(ch)}</span>
      <div class="col-info">
        <div class="col-detail" style="display:none;">
          <div class="col-pinyin">${escapeHtml(item.pinyin || '')}</div>
          ${item.note ? `<div class="col-note">${escapeHtml(item.note)}</div>` : ''}
        </div>
      </div>
      <div class="col-mastery" id="mastery_${escapeHtml(ch)}">
        <button class="col-mastery-btn" onclick="event.stopPropagation();adjustMastery('${escapeHtml(ch)}',-1)" ondblclick="event.stopPropagation()" title="降低掌握度">▼</button>
        <span class="col-mastery-val mastery-${item.mastery || 5}">${item.mastery || 5}</span>
        <button class="col-mastery-btn" onclick="event.stopPropagation();adjustMastery('${escapeHtml(ch)}',1)" ondblclick="event.stopPropagation()" title="提高掌握度">▲</button>
      </div>
      <button class="col-del" onclick="event.stopPropagation();deleteCollection('${escapeHtml(ch)}')" title="删除">✕</button>
    </div>`;
  });
  body.innerHTML = html;
}

// ============================================================
//  MASTERY LEVEL
// ============================================================
function adjustMastery(ch, delta) {
  if (!collections[ch]) return;
  let level = collections[ch].mastery || 5;
  level = Math.max(1, Math.min(9, level + delta));
  collections[ch].mastery = level;
  persistCollections();
  // Update display without full re-render
  const item = document.getElementById('mastery_' + ch);
  if (item) {
    const valEl = item.querySelector('.col-mastery-val');
    valEl.textContent = level;
    valEl.className = 'col-mastery-val mastery-' + level;
  }
}

// ============================================================
//  COLLECTIONS MASTERY FILTER
// ============================================================
const masteryColors = ['','#E53935','#F4511E','#FF9800','#FFC107','#CDDC39','#8BC34A','#4CAF50','#009688','#2196F3'];
const masteryLabels = ['全部','1 ★','2 ★★','3 ★★★','4 ★★★★','5 ★★★★★','6 ★★★★★★','7 ★★★★★★★','8 ★★★★★★★★','9 ★★★★★★★★★'];

function toggleColFilter(e) {
  e.stopPropagation();
  const dd = document.getElementById('colFilterDropdown');
  const arrow = document.getElementById('filterArrow');
  const isOpen = dd.classList.contains('show');
  if (isOpen) {
    dd.classList.remove('show');
    arrow.classList.remove('open');
  } else {
    buildFilterDropdown();
    dd.classList.add('show');
    arrow.classList.add('open');
  }
}

function buildFilterDropdown() {
  const dd = document.getElementById('colFilterDropdown');
  let html = '';
  for (let i = 0; i <= 9; i++) {
    const active = colMasteryFilter === i ? ' active' : '';
    const dot = i > 0 ? `<span class="mastery-dot" style="background:${masteryColors[i]}"></span>` : '';
    html += `<div class="col-filter-option${active}" onclick="setColFilter(${i})">${dot}${masteryLabels[i]}</div>`;
  }
  dd.innerHTML = html;
}

function setColFilter(level) {
  colMasteryFilter = level;
  document.getElementById('colFilterDropdown').classList.remove('show');
  document.getElementById('filterArrow').classList.remove('open');
  renderCollections();
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  const dd = document.getElementById('colFilterDropdown');
  if (dd && dd.classList.contains('show')) {
    dd.classList.remove('show');
    document.getElementById('filterArrow').classList.remove('open');
  }
});

// ============================================================
//  SETTINGS PERSISTENCE
// ============================================================
async function saveSettings() {
  try {
    const settings = {
      id: 'app_settings',
      fontSize: document.getElementById('fontSizeRange').value,
      fontFamily: document.getElementById('fontFamilySelect').value,
      speechLang: document.getElementById('speechLangSelect').value,
      speechVoice: document.getElementById('speechVoiceSelect').value,
      speechRate: document.getElementById('speechRateRange').value,
      speechMode: document.getElementById('speechModeSelect').value,
      speechPause: document.getElementById('speechPauseRange').value,
      autoCollect: document.getElementById('autoCollectCheckbox').checked
    };
    await dbPut('settings', settings);
  } catch(e) { console.error('Save settings failed:', e); }
}

async function loadSettings() {
  try {
    const data = await dbGet('settings', 'app_settings');
    if (data) {
      if (data.fontSize) {
        document.getElementById('fontSizeRange').value = data.fontSize;
        document.getElementById('fontSizeVal').textContent = data.fontSize;
        document.getElementById('readerContent').style.fontSize = data.fontSize + 'px';
      }
      if (data.fontFamily) {
        document.getElementById('fontFamilySelect').value = data.fontFamily;
        document.getElementById('readerContent').style.fontFamily = data.fontFamily;
      }
      if (data.speechLang) {
        document.getElementById('speechLangSelect').value = data.speechLang;
      }
      if (data.speechRate) {
        document.getElementById('speechRateRange').value = data.speechRate;
        document.getElementById('speechRateVal').textContent = data.speechRate;
      }
      if (data.speechVoice) {
        window._pendingSpeechVoice = data.speechVoice;
      }
      if (data.speechMode) {
        document.getElementById('speechModeSelect').value = data.speechMode;
      }
      if (data.speechPause) {
        document.getElementById('speechPauseRange').value = data.speechPause;
        document.getElementById('speechPauseVal').textContent = data.speechPause;
      }
      if (data.autoCollect !== undefined) {
        document.getElementById('autoCollectCheckbox').checked = data.autoCollect;
      }
    }
  } catch(e) { console.error('Load settings failed:', e); }
}

// ============================================================
//  PERSISTENCE
// ============================================================
async function persistCollections() {
  try {
    const db = await openDB();
    const tx = db.transaction('collections', 'readwrite');
    const store = tx.objectStore('collections');

    // 获取当前数据库中所有已存的 key
    const existingKeys = new Set();
    await new Promise((resolve, reject) => {
      const req = store.getAllKeys();
      req.onsuccess = () => {
        req.result.forEach(k => existingKeys.add(k));
        resolve();
      };
      req.onerror = e => reject(e.target.error);
    });

    // 遍历当前 collections，upsert
    for (const [char, val] of Object.entries(collections)) {
      store.put({ char, ...val });
      existingKeys.delete(char); // 标记为仍需要
    }

    // 删除已不在 collections 中的条目
    for (const key of existingKeys) {
      store.delete(key);
    }

    await new Promise((resolve, reject) => {
      tx.oncomplete = resolve;
      tx.onerror = e => reject(e.target.error);
    });
  } catch(e) { console.error('Save collections failed:', e); }
}

async function loadCollections() {
  try {
    const items = await dbGetAll('collections');
    collections = {};
    items.forEach(item => {
      collections[item.char] = { pinyin: item.pinyin || '', note: item.note || '', mastery: item.mastery || 5 };
    });
  } catch(e) {
    console.error('Load collections failed:', e);
    collections = {};
  }
}

// ============================================================
//  EXPORT / IMPORT (全量备份恢复)
// ============================================================
async function exportAllData() {
  try {
    const articles = await dbGetAll('articles');
    const collectionsItems = await dbGetAll('collections');
    const settings = await dbGet('settings', 'app_settings');
    
    const backup = {
      _type: 'PDJ阅读天天练备份',
      _version: 2,
      _date: new Date().toISOString(),
      articles: articles,
      collections: collectionsItems,
      settings: settings || null
    };
    
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `PDJ阅读备份_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('导出失败：' + e.message);
  }
}

async function importAllData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data || data._type !== 'PDJ阅读天天练备份') {
        alert('文件格式不正确，请选择正确的 PDJ 阅读天天练备份文件。');
        return;
      }
      
      let articleCount = 0, collectionCount = 0;
      
      // Import articles
      if (data.articles && Array.isArray(data.articles)) {
        for (const article of data.articles) {
          await dbPut('articles', article);
          articleCount++;
        }
      }
      
      // Import collections
      if (data.collections && Array.isArray(data.collections)) {
        for (const item of data.collections) {
          collections[item.char] = { pinyin: item.pinyin || '', note: item.note || '' };
          await dbPut('collections', item);
          collectionCount++;
        }
      }
      
      // Import settings
      if (data.settings) {
        await dbPut('settings', data.settings);
      }
      
      // Refresh UI
      renderCollections();
      await loadSettings();
      await renderArticleList();
      if (rawText) renderText(rawText);
      
      alert(`导入成功！\n- 已读文章：${articleCount} 篇\n- 收藏汉字：${collectionCount} 个\n- 设置参数：${data.settings ? '已恢复' : '无'}`);
    } catch(err) {
      alert('导入失败：' + err.message);
    }
  };
  reader.readAsText(file, 'UTF-8');
  document.getElementById('importAllInput').value = '';
}
