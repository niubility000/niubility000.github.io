<title>PDJ阅读天天练</title>
<style>
  :root {
    --primary: #4A90D9;
    --primary-dark: #357ABD;
    --bg: #F5F0E8;
    --card-bg: #FFFFFF;
    --text: #333;
    --border: #DDD;
    --star-color: #FFB300;
    --highlight-bg: #FFF9C4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-top: 60px;
  }

  /* ===== HEADER ===== */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 800;
    background: linear-gradient(135deg, #4A90D9, #7B68EE);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .header h1 { font-size: 24px; font-weight: 700; letter-spacing: 2px; }
  .header-actions { display: flex; gap: 10px; }

  /* ===== BUTTONS ===== */
  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,.15); }
  .btn-primary { background: #fff; color: var(--primary-dark); font-weight: 600; }
  .btn-secondary { background: rgba(255,255,255,.2); color: #fff; }
  .btn-secondary:hover { background: rgba(255,255,255,.35); }
  .btn-star { font-size: 22px; background: none; border: none; cursor: pointer; padding: 4px; transition: transform .2s; }
  .btn-star:hover { transform: scale(1.2); }
  .btn-star.active { animation: starPop .4s ease; }
  @keyframes starPop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }

  /* ===== TOOLBAR (removed, now in settings panel) ===== */

  /* ===== FILE UPLOAD AREA ===== */
  .upload-area {
    max-width: 600px;
    margin: 10px auto 16px;
    padding: 30px 40px;
    text-align: center;
    background: var(--card-bg);
    border: 3px dashed var(--border);
    border-radius: 20px;
    cursor: pointer;
    transition: all .3s;
  }
  .upload-area:hover, .upload-area.dragover {
    border-color: var(--primary);
    background: #EDF4FB;
    transform: scale(1.01);
  }
  .upload-area .icon { font-size: 48px; margin-bottom: 10px; }
  .upload-area h2 { font-size: 20px; color: #555; margin-bottom: 8px; }
  .upload-area p { font-size: 14px; color: #999; }
  .upload-area input[type="file"] { display: none; }
  .paste-area {
    max-width: 600px;
    margin: 8px auto;
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 10px;
    text-align: center;
  }
  .paste-area h3 { font-size: 15px; color: #555; margin-bottom: 10px; }
  .paste-area textarea {
    width: 100%;
    height: 120px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
    resize: vertical;
    box-sizing: border-box;
    font-family: inherit;
    line-height: 1.6;
  }
  .paste-area textarea:focus { outline: none; border-color: var(--primary); }
  .paste-area .paste-btn {
    margin-top: 10px;
    padding: 8px 24px;
    font-size: 14px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background .2s;
  }
  .paste-area .paste-btn:hover { background: var(--primary-dark); }

  /* ===== READER ===== */
  .reader {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px;
    display: none;
  }
  .reader.show { display: block; }
  .reader-content {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
    line-height: 2;
    white-space: pre-wrap;
    word-break: normal;
    overflow-wrap: break-word;
    text-align: justify;
    cursor: default;
  }
  .reader-content .para-gap {
    display: block;
    height: 4px;
  }
  .reader-content .para-block {
    contain: layout;
  }
  .reader-content.zh-mode .para-block {
    text-indent: 1em;
  }
  .reader-content.zh-mode .para-block.no-indent {
    text-indent: 0;
  }
  .reader-content.zh-mode .para-block:not(.no-indent) .para-speaker {
    margin-left: -1.3em;
    margin-right: 2px;
  }
  .reader-content .char {
    cursor: pointer;
    transition: background .15s, color .15s, border-radius .15s;
    display: inline;
    position: relative;
  }
  .reader-content .char:hover {
    background: rgba(74,144,217,.12);
    border-radius: 2px;
  }
  .reader-content .char.collected {
    font-weight: 900;
    color: #D84315;
    border-bottom: 2px solid #FFB300;
  }
  .reader-content .char.collected.collected-phrase {
    font-weight: normal;
    color: inherit;
    border-bottom: none;
    background: yellow;
    border-radius: 3px;
  }
  .reader-content .char.collected.collected-phrase.collected-single {
    font-weight: 900;
    color: #D84315;
  }
  .reader-content .char.speaking {
    background: rgba(74,144,217,.18);
    border-radius: 2px;
  }

  /* Paragraph speaker icon */
  .para-speaker {
    display: inline-block;
    cursor: pointer;
    opacity: 0.6;
    font-size: 14px;
    vertical-align: middle;
    margin-right: 4px;
    transition: opacity .2s;
    line-height: 2;
    user-select: none;
  }
  .para-speaker:hover {
    opacity: 1;
  }
  .para-speaker.active {
    opacity: 1;
    color: var(--primary-dark);
  }

  /* User switcher buttons */
  .user-btn.active {
    background: linear-gradient(135deg, #4A90D9, #7B68EE) !important;
    color: #fff !important;
    box-shadow: 0 2px 8px rgba(74,144,217,.3);
  }

  /* Paragraph word count and checkbox */
  .para-word-count {
    font-size: 0.6em;
    vertical-align: super;
    color: #999;
    margin-left: 4px;
    user-select: none;
  }
  /* Alternate Zh-En mode: click word-count to toggle Chinese translation */
  .zh-en-tooltip {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 0;
    background: #333;
    color: #fff;
    font-size: 14px;
    line-height: 1.6;
    padding: 8px 14px;
    border-radius: 8px;
    white-space: pre-wrap;
    max-width: 90vw;
    min-width: 120px;
    z-index: 900;
    box-shadow: 0 4px 16px rgba(0,0,0,.25);
    word-break: break-all;
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
  }
  .zh-en-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 20px;
    border: 6px solid transparent;
    border-top-color: #333;
  }
  .para-word-count.zh-en-toggle {
    cursor: pointer;
    color: var(--primary);
    text-decoration: underline dotted;
  }
  .zh-en-para.active .zh-en-tooltip {
    display: block;
  }
  .zh-en-para {
    position: relative;
    display: inline-block;
    vertical-align: top;
  }
  .para-checkbox {
    display: inline-block;
    width: 16px;
    height: 16px;
    margin-left: 6px;
    vertical-align: middle;
    cursor: pointer;
    accent-color: var(--primary);
  }
  .para-checkbox:checked {
    cursor: default;
  }
  .para-check-date {
    font-size: 0.6em;
    vertical-align: super;
    color: #66BB6A;
    margin-left: 4px;
    user-select: none;
  }
  .para-read-stats {
    font-size: 13px;
    color: #888;
    margin-top: 6px;
  }
  .para-read-stats strong {
    color: var(--primary-dark);
  }

  /* Clickable total read words */
  .total-read-clickable {
    cursor: pointer;
    text-decoration: underline dotted;
    transition: color .2s;
  }
  .total-read-clickable:hover {
    color: var(--primary) !important;
  }

  /* History stats modal */
  .history-modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.45);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    animation: fadeIn .2s;
  }
  .history-modal-overlay.show { display: flex; }

  .history-modal {
    background: var(--card-bg);
    border-radius: 20px;
    width: 420px;
    max-width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    box-shadow: 0 16px 48px rgba(0,0,0,.2);
    animation: slideUp .3s ease;
  }
  @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }

  .history-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--card-bg);
    border-radius: 20px 20px 0 0;
    z-index: 1;
  }
  .history-modal-header h2 {
    font-size: 18px;
    color: #333;
  }
  .history-modal-close {
    font-size: 22px;
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    padding: 2px 6px;
    line-height: 1;
    transition: color .2s;
  }
  .history-modal-close:hover { color: #333; }

  .history-modal-body {
    padding: 16px 24px 24px;
  }

  .history-summary {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: linear-gradient(135deg, #E3F2FD, #E8F5E9);
    border-radius: 12px;
  }
  .history-summary-item {
    flex: 1;
    text-align: center;
  }
  .history-summary-item .num {
    font-size: 24px;
    font-weight: 700;
    color: var(--primary-dark);
  }
  .history-summary-item .label {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }

  .history-day-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .history-day-item:last-child { border-bottom: none; }

  .history-day-date {
    font-size: 14px;
    color: #555;
  }
  .history-day-date .weekday {
    font-size: 12px;
    color: #999;
    margin-left: 8px;
  }

  .history-day-words {
    font-size: 16px;
    font-weight: 600;
    color: var(--primary-dark);
  }

  .history-empty {
    text-align: center;
    padding: 40px 20px;
    color: #999;
    font-size: 14px;
  }

  /* Reading guide */
  .reading-guide {
    margin-top: 20px;
    padding: 16px;
    background: #f9fafb;
    border-radius: 10px;
    border: 1px solid #eef0f2;
  }
  .reading-guide-title {
    font-size: 14px;
    font-weight: 600;
    color: #555;
    margin-bottom: 12px;
  }
  .reading-guide-section {
    margin-bottom: 12px;
  }
  .reading-guide-section:last-child { margin-bottom: 0; }
  .reading-guide-grade {
    font-size: 13px;
    font-weight: 600;
    color: #666;
    margin-bottom: 4px;
  }
  .reading-guide-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-size: 12px;
    color: #888;
    padding: 2px 0 2px 16px;
    line-height: 1.8;
  }
  .reading-guide-row .guide-year {
    flex-shrink: 0;
    width: 48px;
    font-weight: 500;
    color: #777;
  }
  .reading-guide-note {
    font-size: 12px;
    color: #999;
    padding: 4px 0 0 16px;
    font-style: italic;
  }

  /* Word selection highlight */
  .word-selection {
    background: rgba(255, 193, 7, 0.35) !important;
    border-radius: 3px;
    cursor: pointer;
    transition: background .15s;
  }
  .word-selection:hover {
    background: rgba(255, 193, 7, 0.55) !important;
  }

  /* Hover tooltip for collected chars */
  .char-tooltip {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    color: #333;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 15px;
    white-space: nowrap;
    z-index: 850;
    pointer-events: none;
    box-shadow: 0 2px 10px rgba(0,0,0,.18);
    line-height: 1.4;
    border: 1px solid #e0e0e0;
    max-width: 500px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .char-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #fff;
  }
  .reader-content .char.collected:hover .char-tooltip { display: block; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.45);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    animation: fadeIn .2s;
  }
  .modal-overlay.show { display: flex; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .modal {
    background: var(--card-bg);
    border-radius: 20px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    box-shadow: 0 16px 48px rgba(0,0,0,.2);
    animation: slideLeft .3s ease;
    position: fixed;
    top: 80px;
    left: 24px;
  }
  @keyframes slideLeft { from{transform:translateX(-30px);opacity:0} to{transform:translateX(0);opacity:1} }

  .modal-header {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 16px 24px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--card-bg);
    z-index: 1;
    border-radius: 20px 20px 0 0;
  }
  .modal-header .header-actions {
    width: 100%;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .category-selector {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 8px;
    background: rgba(74,144,217,.1);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background .2s;
    position: relative;
    height: 28px;
    line-height: 1;
  }
  .category-selector:hover {
    background: rgba(74,144,217,.2);
  }
  .category-selector.disabled {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }
  .category-label {
    color: #666;
  }
  .category-value {
    color: var(--primary-dark);
    font-weight: 600;
    min-width: 40px;
  }
  .category-arrow {
    font-size: 11px;
    color: #999;
  }
  .category-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 4px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
    padding: 6px 0;
    z-index: 950;
    min-width: 140px;
    max-height: 240px;
    overflow-y: auto;
  }
  .category-dropdown.show {
    display: block;
  }
  .category-option {
    padding: 8px 14px;
    font-size: 14px;
    cursor: pointer;
    color: #333;
    white-space: nowrap;
  }
  .category-option:hover {
    background: #F0F4FF;
  }
  .category-option.active {
    color: var(--primary-dark);
    font-weight: 600;
    background: rgba(74,144,217,.1);
  }
  .category-custom-input {
    margin: 6px 8px;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 13px;
    width: calc(100% - 16px);
    outline: none;
  }
  .category-custom-input:focus {
    border-color: var(--primary);
  }
  .category-custom-btn {
    margin: 0 8px 6px;
    padding: 6px 12px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    width: calc(100% - 16px);
  }
  .category-custom-btn:hover {
    opacity: 0.85;
  }
  .modal-header .char-display {
    font-size: 48px;
    font-weight: 700;
    color: var(--primary-dark);
    line-height: 1;
  }
  .modal-header .star-btn {
    font-size: 28px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 4px;
    transition: transform .25s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    height: 28px;
  }
  .modal-header .star-btn:hover { transform: scale(1.25); }
  .modal-header .star-btn.active { color: var(--star-color); }

  .modal-close {
    font-size: 24px;
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    padding: 2px 4px;
    transition: color .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    height: 28px;
  }
  .modal-close:hover { color: #333; }

  .modal-body { padding: 16px 24px 24px; }

  .modal-section {
    margin-bottom: 16px;
  }
  .modal-section h3 {
    font-size: 14px;
    color: #888;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .modal-section p {
    font-size: 16px;
    line-height: 1.8;
  }
  .modal-section .pinyin {
    font-size: 28px;
    color: var(--primary-dark);
    font-weight: 600;
    letter-spacing: 4px;
  }

  /* Stroke canvas */
  .stroke-controls {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
  }
  .stroke-controls .btn { font-size: 13px; padding: 6px 14px; }

  .modal-section .ai-tips {
    background: linear-gradient(135deg, #E8F5E9, #FFF8E1);
    border-left: 4px solid #66BB6A;
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    font-size: 15px;
    line-height: 1.8;
    color: #555;
  }
  .modal-section .ai-tips::before {
    content: '💡 ';
  }

  .modal-section textarea {
    width: 100%;
    min-height: 120px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    transition: border-color .2s;
  }
  .modal-section textarea:focus {
    outline: none;
    border-color: var(--primary);
  }

  .loading-hint {
    text-align: center;
    padding: 12px;
    color: #999;
    font-size: 14px;
  }

  /* ===== COLLECTIONS PANEL ===== */
  .collections-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.4);
    z-index: 900;
    animation: fadeIn .2s;
  }
  .collections-overlay.show { display: block; }

  .collections-panel {
    position: fixed;
    top: 0; right: -420px;
    width: 400px;
    max-width: 90vw;
    height: 100vh;
    background: var(--card-bg);
    box-shadow: -4px 0 20px rgba(0,0,0,.15);
    z-index: 901;
    transition: right .3s ease;
    display: flex;
    flex-direction: column;
  }
  .collections-panel.show { right: 0; }
  .collections-panel.show.fullscreen { width: 100vw; max-width: 100vw; }

  .collections-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .collections-header h2 { font-size: 18px; margin: 0; }
  .col-filter-wrap {
    position: relative;
    display: inline-block;
    margin-left: 8px;
  }
  .col-filter-btn {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: #888;
    padding: 2px 4px;
    vertical-align: middle;
  }
  .col-filter-btn:hover { color: var(--primary-dark); }
  .col-filter-btn .filter-arrow {
    font-size: 12px;
    transition: transform .2s;
  }
  .col-filter-btn .filter-arrow.open { transform: rotate(180deg); }
  .col-filter-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
    padding: 6px 0;
    z-index: 910;
    min-width: 120px;
  }
  .col-filter-dropdown.show { display: block; }
  .col-filter-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    font-size: 14px;
    cursor: pointer;
    color: #333;
    white-space: nowrap;
  }
  .col-filter-option:hover { background: #F0F4FF; }
  .col-filter-option.active { color: var(--primary-dark); font-weight: 600; }
  .col-filter-search {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    margin-top: 2px;
    border-top: 1px solid var(--border);
  }
  .col-filter-search input {
    flex: 1;
    min-width: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 6px;
    font-size: 13px;
    outline: none;
  }
  .col-filter-search input:focus { border-color: var(--primary); }
  .col-filter-search button {
    flex-shrink: 0;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 13px;
    cursor: pointer;
    background: var(--primary);
    color: #fff;
  }
  .col-filter-search button:hover { opacity: 0.85; }
  .collections-body {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 12px 16px;
  }
  .collection-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 10px;
    transition: background .2s;
    border-bottom: 1px solid #f0f0f0;
  }
  .collection-item:hover { background: #F5F5F5; }
  .collection-item .col-char {
    font-size: 26px;
    font-weight: 700;
    color: var(--primary-dark);
    text-align: left;
    max-width: 50%;
    overflow-wrap: break-word;
    word-break: break-word;
    hyphens: auto;
    -webkit-hyphens: auto;
  }
  .collection-item .col-info { flex: 1; }
  .collection-item .col-pinyin { font-size: 16px; color: #666; }
  .collection-item .col-translation {
    font-size: 14px;
    color: #555;
    margin-top: 4px;
    word-break: break-all;
  }
  .collection-item .col-note {
    font-size: 13px;
    color: #999;
    margin-top: 4px;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .collection-item .col-del {
    background: none;
    border: none;
    font-size: 18px;
    color: #CCC;
    cursor: pointer;
    padding: 4px;
    transition: color .2s;
  }
  .collection-item .col-del:hover { color: #E53935; }

  /* Category display in collection items */
  .col-category {
    padding: 4px 8px;
    background: rgba(74,144,217,.1);
    border-radius: 6px;
    font-size: 13px;
    color: var(--primary-dark);
    font-weight: 500;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .collections-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }

  .empty-hint {
    text-align: center;
    padding: 40px 20px;
    color: #BBB;
    font-size: 15px;
  }

  /* ===== SETTINGS PANEL ===== */
  .settings-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.4);
    z-index: 900;
    animation: fadeIn .2s;
  }
  .settings-overlay.show { display: block; }
  .settings-panel {
    position: fixed;
    top: 0; right: -420px;
    width: 340px;
    max-width: 90vw;
    height: 100vh;
    background: var(--card-bg);
    box-shadow: -4px 0 20px rgba(0,0,0,.15);
    z-index: 901;
    transition: right .3s ease;
    display: flex;
    flex-direction: column;
  }
  .settings-panel.show { right: 0; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #CCC; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #AAA; }

  /* ===== ARTICLE LIST ===== */
  .article-list {
    max-width: 600px;
    margin: 0 auto 40px;
    padding: 0 24px;
  }
  .article-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card-bg);
    border-radius: 12px;
    margin-bottom: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    transition: box-shadow .2s;
    cursor: pointer;
  }
  .article-item:hover { box-shadow: 0 3px 12px rgba(0,0,0,.1); }
  .article-item .art-icon { font-size: 24px; flex-shrink: 0; }
  .article-item .art-info { flex: 1; min-width: 0; }
  .article-item .art-name {
    font-size: 15px;
    color: #333;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .article-item .art-meta { font-size: 12px; color: #AAA; margin-top: 4px; }
  .article-item .art-del {
    background: none;
    border: none;
    font-size: 18px;
    color: #CCC;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all .2s;
    flex-shrink: 0;
  }
  .article-item .art-del:hover { color: #E53935; background: #FFEBEE; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,.75);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s, transform .3s;
    z-index: 10000;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== DESKTOP LAYOUT (3-column) ===== */
  @media (min-width: 769px) {
    .reader {
      max-width: 60%;
      width: 60%;
    }

    /* Char modal (query) - left 20% */
    .modal-overlay {
      left: 0;
      right: auto;
      top: 84px;
      bottom: 0;
      width: 20%;
      justify-content: flex-start;
      align-items: flex-start;
    }
    .modal-overlay.show {
      display: flex;
    }
    .modal {
      position: relative;
      top: 0;
      left: 0;
      width: 100%;
      max-width: 100%;
      height: 100%;
      max-height: 100%;
      border-radius: 0;
      animation: slideLeft .3s ease;
    }

    /* Settings panel - right 20% */
    .settings-overlay {
      left: auto;
      right: 0;
      top: 84px;
      bottom: 0;
      width: 20%;
    }
    .settings-panel {
      top: 84px;
      right: -20vw;
      width: 20%;
      max-width: 20%;
      height: calc(100vh - 84px);
    }
    .settings-panel.show {
      right: 0;
    }

    /* Collections panel - right 20% */
    .collections-overlay {
      left: auto;
      right: 0;
      top: 84px;
      bottom: 0;
      width: 20%;
    }
    .collections-panel {
      top: 84px;
      right: -20vw;
      width: 20%;
      max-width: 20%;
      height: calc(100vh - 84px);
    }
    .collections-panel.show {
      right: 0;
    }

    /* History modal - center overlay on the 60% area */
    .history-modal-overlay {
      left: 20%;
      right: 20%;
      top: 84px;
      bottom: 0;
      width: 60%;
    }
  }

  /* ===== MOBILE ADAPTATION ===== */
  @media (max-width: 768px) {
    .header {
      padding: 10px 12px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .header h1 { font-size: 18px; letter-spacing: 1px; }
    .header-actions { gap: 6px; }
    .btn { padding: 8px 12px; font-size: 13px; min-height: 40px; }

    .upload-area {
      margin: 8px auto;
      padding: 40px 20px;
      border-radius: 14px;
    }
    .upload-area .icon { font-size: 36px; }
    .upload-area h2 { font-size: 17px; }
    .paste-area { margin: 12px auto; padding: 14px; }
    .paste-area textarea { height: 90px; font-size: 13px; }
    .paste-area .paste-btn { padding: 7px 18px; font-size: 13px; }

    .reader { padding: 12px; }
    .reader-content {
      padding: 16px;
      border-radius: 12px;
      line-height: 1.8;
    }
    .reader-content .char { font-size: inherit; }

    .modal {
      width: calc(100vw - 24px);
      max-height: 85vh;
      border-radius: 14px;
    }
    .modal-header .char-display { font-size: 36px; }
    .modal-body { padding: 12px 16px 16px; }
    .modal-section textarea { min-height: 60px; }

    .collections-panel, .settings-panel {
      width: 100vw;
      max-width: 100vw;
      right: -110vw;
    }
    .collections-panel.show, .settings-panel.show { right: 0; }

    .collection-item { padding: 10px; gap: 8px; }
    .collection-item .col-char { font-size: 26px; }
    .user-btn { padding: 6px 14px !important; font-size: 14px !important; }
  }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <h1>📚 PDJ阅读天天练</h1>
    <button class="btn btn-secondary" id="headerHomeBtn" onclick="goHome()" style="font-size:16px;padding:6px 10px;display:none;" title="返回首页">🏠</button>
  </div>
  <div class="header-actions">
    <button class="btn btn-secondary" id="headerEditBtn" onclick="toggleEditMode()" style="font-size:16px;padding:6px 10px;display:none;" title="编辑">✏</button>
    <button class="btn btn-secondary" onclick="toggleCollections()" style="font-size:16px;padding:6px 10px;position:relative;" title="收藏夹">⭐<span id="colCount" style="position:absolute;top:-4px;right:-6px;background:#FF7043;color:#fff;font-size:10px;padding:0 4px;border-radius:8px;line-height:1.3;min-width:16px;text-align:center;">0</span></button>
    <button class="btn btn-secondary" onclick="toggleSettings()" style="font-size:16px;padding:6px 10px;" title="设置">⚙</button>
  </div>
</div>

<!-- ===== USER SWITCHER ===== -->
<div id="userSwitcher" style="max-width:600px;margin:8px auto 0px;padding:0 24px;text-align:center;">
  <div style="display:inline-flex;gap:8px;background:#fff;padding:4px;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);">
    <button class="user-btn active" id="user1Btn" onclick="switchUser('user1')" style="padding:8px 20px;border:none;border-radius:10px;font-size:15px;cursor:pointer;background:transparent;color:#666;transition:all .2s;">👶 用户一</button>
    <button class="user-btn" id="user2Btn" onclick="switchUser('user2')" style="padding:8px 20px;border:none;border-radius:10px;font-size:15px;cursor:pointer;background:transparent;color:#666;transition:all .2s;">👶 用户二</button>
  </div>
  <div id="currentUserLabel" style="margin-top:8px;font-size:13px;color:#999;"><span id="currentUserName">当前：用户一</span> &nbsp;|&nbsp; 今日已读 <strong id="todayReadWords" style="color:#4A90D9;">0</strong> 字 &nbsp;|&nbsp; 共读 <strong id="totalReadWords" class="total-read-clickable" style="color:#66BB6A;" onclick="openHistoryModal()" title="点击查看历史阅读统计">0</strong> 字</div>
</div>

<!-- ===== UPLOAD AREA ===== -->
<div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
  <div class="icon">📖</div>
  <h2>选择一个 TXT 文件开始阅读</h2>
  <p>支持拖拽文件到此处，或点击选择文件</p>
  <input type="file" id="fileInput" accept=".txt" onchange="handleFile(this.files[0])">
</div>

<!-- ===== PASTE AREA ===== -->
<div class="paste-area" id="pasteArea">
  <h3>📋 或直接粘贴文本开始阅读</h3>
  <textarea id="pasteTextarea" placeholder="在此粘贴文章内容。支持中文文章、英文文章、中英对照文本(格式为一行英文，一行中文...，可用豆包ai生成)"></textarea>
  <button class="paste-btn" onclick="handlePasteText()">开始阅读</button>
</div>

<!-- ===== ARTICLE LIST ===== -->
<div class="article-list" id="articleList" style="display:none;">
  <h3 style="font-size:16px;color:#888;margin-bottom:12px;">📂 最近阅读的文章</h3>
  <div id="articleListBody"></div>
</div>

<!-- ===== READER ===== -->
<div class="reader" id="reader">
  <div class="reader-content" id="readerContent"></div>
</div>

<!-- ===== CHARACTER MODAL ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="charModal">
    <div class="modal-header">
      <div class="header-actions">
        <button class="star-btn" id="modalStar" onclick="toggleCollect()" title="收藏此字">☆</button>
        <div class="category-selector" id="modalCategorySelector" onclick="toggleModalCategoryDropdown(event)">
          <span class="category-label">类别</span>
          <span class="category-value" id="modalCategoryValue">未掌握</span>
          <span class="category-arrow">▾</span>
          <div class="category-dropdown" id="modalCategoryDropdown" onclick="event.stopPropagation()"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <span class="char-display" id="modalChar">字</span>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <h3 id="modalPinyinLabel">汉语拼音</h3>
        <p class="pinyin" id="modalPinyin" onclick="speakChar()" title="点击朗读" style="cursor:pointer;user-select:none;">加载中...</p>
      </div>
      <div class="modal-section">
        <h3>笔画顺序</h3>
        <div style="text-align:center;">
          <img id="strokeImg" style="width:180px;height:180px;border:2px solid var(--border);border-radius:12px;background:#FAFAFA;display:block;margin:0 auto 8px;object-fit:contain;" alt="笔画动画加载中...">
          <div id="strokeLoading" style="color:#999;font-size:13px;margin-bottom:8px;">加载中...</div>
          <div class="stroke-controls">
            <button class="btn btn-primary" onclick="replayStrokeAnimation()">▶ 重新播放</button>
          </div>
        </div>
      </div>
      <div class="modal-section">
        <h3>我的笔记 <a href="https://www.doubao.com" target="_blank" style="font-size:13px;color:#4a90d9;text-decoration:none;margin-left:8px;font-weight:normal;">问AI</a></h3>
        <textarea id="modalNotes" placeholder="助记法、要点、多音字区分方法等..." oninput="saveCurrentNote()"></textarea>
      </div>
      <div class="modal-section">
        <h3>基本解释</h3>
        <p id="modalDefinition">加载中...</p>
      </div>
    </div>
  </div>
</div>

<!-- ===== SETTINGS PANEL ===== -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="collections-header">
    <h2>⚙ 阅读设置</h2>
    <button class="btn btn-primary" onclick="closeSettings()" style="font-size:13px;padding:6px 14px;">关闭</button>
  </div>
  <div style="padding:24px 20px;overflow-y:auto;overscroll-behavior:contain;flex:1;">
    <div style="margin-bottom:24px;">
      <label style="font-size:15px;color:#555;display:block;margin-bottom:10px;">字号：<strong id="fontSizeVal">32</strong>px</label>
      <input type="range" id="fontSizeRange" min="18" max="80" value="32" oninput="updateFontSize(this.value)" style="width:100%;cursor:pointer;">
    </div>
    <div style="margin-bottom:24px;">
      <label style="font-size:15px;color:#555;display:block;margin-bottom:10px;">字体</label>
      <select id="fontFamilySelect" onchange="updateFontFamily(this.value)" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;">
        <option value="Microsoft YaHei, PingFang SC, sans-serif">微软雅黑</option>
        <option value="楷体, KaiTi, STKaiti">楷体</option>
        <option value="宋体, SimSun, STSong">宋体</option>
        <option value="黑体, SimHei, STHeiti">黑体</option>
        <option value="仿宋, FangSong, STFangsong">仿宋</option>
        <optgroup label="── 英文字体 ──">
          <option value="Times New Roman, Times, serif">Times New Roman</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="Arial, Helvetica, sans-serif">Arial</option>
          <option value="Verdana, Geneva, sans-serif">Verdana</option>
          <option value="Trebuchet MS, Helvetica, sans-serif">Trebuchet MS</option>
          <option value="Tahoma, Geneva, sans-serif">Tahoma</option>
          <option value="Segoe UI, Helvetica, Arial, sans-serif">Segoe UI</option>
          <option value="Calibri, Segoe UI, sans-serif">Calibri</option>
          <option value="Cambria, Georgia, serif">Cambria</option>
          <option value="Consolas, Monaco, monospace">Consolas</option>
          <option value="Courier New, Courier, monospace">Courier New</option>
          <option value="Garamond, Times New Roman, serif">Garamond</option>
          <option value="Palatino Linotype, Palatino, serif">Palatino</option>
          <option value="Book Antiqua, Palatino, serif">Book Antiqua</option>
        </optgroup>
      </select>
    </div>
    <div style="border-top:1px solid #eee;margin:20px 0;"></div>
    <div style="margin-bottom:24px;">
      <label style="font-size:15px;color:#555;display:block;margin-bottom:10px;">🔊 语音朗读设置</label>
    </div>
    <div style="margin-bottom:20px;">
      <label style="font-size:14px;color:#666;display:block;margin-bottom:8px;">朗读语言</label>
      <select id="speechLangSelect" onchange="onSpeechLangChange();saveSettings();" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;">
        <option value="zh-CN">中文</option>
        <option value="en-US">英文</option>
        <option value="ja-JP">日语</option>
        <option value="ko-KR">韩语</option>
        <option value="fr-FR">法语</option>
        <option value="de-DE">德语</option>
        <option value="es-ES">西班牙语</option>
        <option value="ru-RU">俄语</option>
      </select>
    </div>
    <div style="margin-bottom:20px;">
      <label style="font-size:14px;color:#666;display:block;margin-bottom:8px;">发音人</label>
      <div style="display:flex;gap:8px;align-items:center;min-width:0;">
        <select id="speechVoiceSelect" onchange="saveSettings()" style="flex:1;min-width:0;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;">
          <option value="">系统默认</option>
        </select>
        <button onclick="testSpeechVoice()" style="flex-shrink:0;padding:6px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:16px;" title="测试发音">🔊</button>
      </div>
    </div>
    <div style="margin-bottom:24px;">
      <label style="font-size:14px;color:#666;display:flex;align-items:center;gap:8px;margin-bottom:8px;">朗读速度：<strong id="speechRateVal">0.6</strong>x</label>
      <input type="range" id="speechRateRange" min="0.5" max="2" step="0.1" value="0.6" oninput="updateSpeechRate(this.value)" style="width:100%;cursor:pointer;">
    </div>
    <div style="margin-bottom:20px;">
      <label style="font-size:14px;color:#666;display:block;margin-bottom:8px;">朗读模式</label>
      <select id="speechModeSelect" onchange="saveSettings()" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;">
        <option value="continuous">连续朗读（读完后继续下一段）</option>
        <option value="loop">循环朗读（重复当前段）</option>
        <option value="single">单段朗读（读完当前段停止）</option>
      </select>
    </div>
    <div style="margin-bottom:24px;">
      <label style="font-size:14px;color:#666;display:flex;align-items:center;gap:8px;margin-bottom:8px;">段间停顿：<strong id="speechPauseVal">0.5</strong>秒</label>
      <input type="range" id="speechPauseRange" min="0" max="5" step="0.1" value="0.5" oninput="updateSpeechPause(this.value)" style="width:100%;cursor:pointer;">
    </div>
    <div style="border-top:1px solid #eee;margin:24px 0;"></div>
    <div style="margin-bottom:20px;">
      <label style="font-size:15px;color:#555;display:block;margin-bottom:10px;">🔍 查询引擎设置</label>
      <select id="queryEngineSelect" onchange="onQueryEngineChange();saveSettings();" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;">
        <option value="zh">中文（查询汉字拼音和释义）</option>
        <option value="en">英文（查询英语单词音标和翻译）</option>
      </select>
      <div style="color:red;font-size:12px;margin-top:4px;">请正确设置，否则阅读时无法点击查询。</div>
    </div>
    <div style="border-top:1px solid #eee;margin:24px 0;"></div>
    <div style="margin-bottom:20px;">
      <label style="font-size:15px;color:#555;display:block;margin-bottom:12px;">⭐ 收藏设置</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:14px;color:#666;cursor:pointer;">
        <input type="checkbox" id="autoCollectCheckbox" onchange="saveSettings()" checked style="width:18px;height:18px;cursor:pointer;">
        查询单字时自动加入收藏
      </label>
    </div>
    <div style="border-top:1px solid #eee;margin:24px 0;"></div>
    <div style="margin-bottom:16px;">
      <label style="font-size:15px;color:#555;display:block;margin-bottom:12px;">📦 数据备份与恢复</label>
      <p style="font-size:12px;color:#999;margin-bottom:12px;">导出或导入全部数据，包括已读文章、收藏夹和设置参数</p>
    </div>

// ============================================================
//  INDEXEDDB HELPERS
// ============================================================
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(getDBName(), DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      const oldVersion = e.oldVersion;
      if (oldVersion < 1) {
        if (!db.objectStoreNames.contains('articles')) {
          db.createObjectStore('articles', { keyPath: 'name' });
        }
      }
      if (oldVersion < 2) {
        if (!db.objectStoreNames.contains('collections')) {
          db.createObjectStore('collections', { keyPath: 'char' });
        }
        if (!db.objectStoreNames.contains('settings')) {
          db.createObjectStore('settings', { keyPath: 'id' });
        }
      }
      if (oldVersion < 3) {
        if (!db.objectStoreNames.contains('para_read')) {
          db.createObjectStore('para_read', { keyPath: 'id' });
        }
      }
      if (oldVersion < 4) {
        if (!db.objectStoreNames.contains('scroll_pos')) {
          db.createObjectStore('scroll_pos', { keyPath: 'id' });
        }
      }
      if (oldVersion < 5) {
        if (!db.objectStoreNames.contains('removed_notes')) {
          db.createObjectStore('removed_notes', { keyPath: 'char' });
        }
      }
      if (oldVersion < 6) {
        if (!db.objectStoreNames.contains('ecdict_cache')) {
          db.createObjectStore('ecdict_cache', { keyPath: 'id' });
        }
        if (!db.objectStoreNames.contains('article_lang')) {
          db.createObjectStore('article_lang', { keyPath: 'name' });
        }
      }
      if (oldVersion < 7) {
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => {
      const err = e.target.error;
      if (err.name === 'VersionError') {
        const req2 = indexedDB.open(getDBName());
        req2.onsuccess = e2 => resolve(e2.target.result);
        req2.onerror = e2 => reject(e2.target.error);
      } else {
        reject(err);
      }
    };
  });
}

async function dbPut(storeName, data) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).put(data);
    tx.oncomplete = resolve;
    tx.onerror = e => reject(e.target.error);
  });
}

async function dbGet(storeName, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function dbGetAll(storeName) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function dbDelete(storeName, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).delete(key);
    tx.oncomplete = resolve;
    tx.onerror = e => reject(e.target.error);
  });
}

async function dbSaveArticle(name, content) {

function getParaRecordId(articleName, paraIndex) {

function getTodayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

async function loadParaReadRecords() {
  try {
    const all = await dbGetAll('para_read');
    paraReadRecords = {};
    for (const rec of all) {
      paraReadRecords[rec.id] = { wordCount: rec.wordCount, date: rec.date };
    }
  } catch(e) { console.error('Load para read records failed:', e); }
}

async function saveParaReadRecord(articleName, paraIndex, wordCount) {
  const id = getParaRecordId(articleName, paraIndex);
  const date = getTodayStr();
  const record = { id, wordCount, date };
  try {
    await dbPut('para_read', record);
    paraReadRecords[id] = { wordCount, date };
  } catch(e) { console.error('Save para read record failed:', e); }
}

function getParaReadRecord(articleName, paraIndex) {
  const id = getParaRecordId(articleName, paraIndex);
  return paraReadRecords[id] || null;
}

function countWordsWithoutPunctuation(text) {
  // Remove punctuation and whitespace, count remaining characters
  // CJK chars count as 1 each, English words count as 1 each
  let count = 0;
  // Count CJK characters
  const cjkMatch = text.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g);
  if (cjkMatch) count += cjkMatch.length;
  // Count English words (sequences of letters)
  const enWords = text.match(/[a-zA-Z]+/g);
  if (enWords) count += enWords.length;
  return count;
}

function getTodayReadWords() {
  const today = getTodayStr();
  let total = 0;
  for (const id in paraReadRecords) {
    if (paraReadRecords[id].date === today) {
      total += paraReadRecords[id].wordCount;
    }
  }
  return total;
}

function getTotalReadWords() {
  let total = 0;
  for (const id in paraReadRecords) {
    total += paraReadRecords[id].wordCount;
  }
  return total;
}

function updateReadStatsDisplay() {
  const todayWords = getTodayReadWords();
  const totalWords = getTotalReadWords();
  const todayEl = document.getElementById('todayReadWords');
  const totalEl = document.getElementById('totalReadWords');
  if (todayEl) todayEl.textContent = todayWords;
  if (totalEl) totalEl.textContent = totalWords;
}

function getDailyReadStats() {
  const daily = {};
  for (const id in paraReadRecords) {
    const record = paraReadRecords[id];
    if (!daily[record.date]) {
      daily[record.date] = 0;
    }
    daily[record.date] += record.wordCount;
  }
  // Sort by date descending
  const sorted = Object.entries(daily).sort((a, b) => b[0].localeCompare(a[0]));
  return sorted;
}

async function openArticle(name) {
  const db = await openDB();
  const tx = db.transaction(DB_STORE, 'readonly');
  const req = tx.objectStore(DB_STORE).get(name);
  req.onsuccess = async () => {
    if (!req.result) return;
    rawText = req.result.content;
    currentArticleName = name;
    await detectAndSetLanguage(rawText);
    currentAlternateMode = detectAlternateZhEn(rawText);
    renderText(rawText);
    document.getElementById('uploadArea').style.display = 'none';
    document.getElementById('pasteArea').style.display = 'none';
    document.getElementById('articleList').style.display = 'none';
    document.getElementById('userSwitcher').style.display = 'none';
    document.getElementById('reader').classList.add('show');
    document.getElementById('headerHomeBtn').style.display = '';
    document.getElementById('headerEditBtn').style.display = '';

  };
}

async function deleteArticle(name) {
  await dbDeleteArticle(name);
  dbDelete('scroll_pos', name).catch(() => {});
  renderArticleList();
}

async function copyArticleToClipboard(name) {
  const db = await openDB();
  const tx = db.transaction(DB_STORE, 'readonly');
  const req = tx.objectStore(DB_STORE).get(name);
  req.onsuccess = () => {
    if (!req.result) return;
    const text = req.result.content;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => showToast('文章已复制到剪贴板')).catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  };
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('文章已复制到剪贴板');
  } catch (err) {
    showToast('复制失败');
  }
  document.body.removeChild(ta);
}

function showToast(msg) {
  let toast = document.getElementById('globalToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'globalToast';
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

(async function init() {
  await loadCollections();
  await loadRemovedNotes();
  renderCollections();
  await loadSettings();
  await loadParaReadRecords();
  updateReadStatsDisplay();
  await renderArticleList();

  // Load speech voices
  if (window.speechSynthesis) {
    loadSpeechVoices();
    window.speechSynthesis.addEventListener('voiceschanged', loadSpeechVoices);
  }

  // Drag & drop
  const area = document.getElementById('uploadArea');
  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('dragover'); });
  area.addEventListener('dragleave', () => area.classList.remove('dragover'));
  area.addEventListener('drop', e => {
    e.preventDefault();
    area.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });

  // Text selection (划词选字)
  document.getElementById('readerContent').addEventListener('mouseup', e => {
    if (isEditMode) return;
    handleTextSelection(e);
  });

  // Click blank area to stop read aloud / clear word selection
  document.getElementById('readerContent').addEventListener('click', e => {
    // In edit mode, do nothing (allow normal text cursor)
    if (isEditMode) return;
    // Skip clearing if a word was just selected (mouseup -> click sequence)
    if (justSelectedWord) {
      justSelectedWord = false;
      return;
    }
    if (!e.target.classList.contains('word-selection')) {
      clearWordSelection();
    }
    if (isReadAloud && !e.target.classList.contains('char') && !e.target.classList.contains('para-speaker')) {
      stopReadAloud();
    }
  });
  // Prevent pinch-zoom and double-tap zoom on mobile
  document.addEventListener('touchmove', function(e) {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function(e) {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, false);
  document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
  document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
  document.addEventListener('gestureend', function(e) { e.preventDefault(); });

  startScrollTracking();
})();

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    rawText = e.target.result.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    const name = file.name.replace(/\.txt$/i, '');
    currentArticleName = name;
    await detectAndSetLanguage(rawText);
    renderText(rawText);
    showReader();
    await dbSaveArticle(name, rawText);
  };
  reader.readAsText(file, 'UTF-8');
}

function handlePasteText() {
  const textarea = document.getElementById('pasteTextarea');
  const text = textarea.value.trim();
  if (!text) return;
  rawText = text;
  // Generate a name from first 20 chars
  const firstLine = text.split('\n')[0].trim();
  const name = '粘贴文本_' + (firstLine.length > 20 ? firstLine.substring(0, 20) : firstLine);
  currentArticleName = name;
  detectAndSetLanguage(rawText);
  renderText(rawText);
  showReader();
  dbSaveArticle(name, rawText);
}

function showReader() {
  document.getElementById('uploadArea').style.display = 'none';
  document.getElementById('pasteArea').style.display = 'none';
  document.getElementById('articleList').style.display = 'none';
  document.getElementById('reader').classList.add('show');
  document.getElementById('headerHomeBtn').style.display = '';
  document.getElementById('headerEditBtn').style.display = '';
}

function goHome() {
  if (isReadAloud) stopReadAloud();
  if (isEditMode) exitEditMode();
  saveScrollPos();
  closeModal();
  closeCollections();
  closeSettings();
  document.getElementById('uploadArea').style.display = '';
  document.getElementById('pasteArea').style.display = '';
  document.getElementById('userSwitcher').style.display = '';
  document.getElementById('reader').classList.remove('show');
  document.getElementById('headerHomeBtn').style.display = 'none';
  document.getElementById('headerEditBtn').style.display = 'none';
  document.getElementById('fileInput').value = '';
  document.getElementById('pasteTextarea').value = '';
  rawText = '';
  currentArticleName = '';
  lastReadStartIndex = -1;
  window.scrollTo(0, 0);
  updateReadStatsDisplay();
  renderArticleList();
}

// Helper: find the raw text index of the first visible char in reading mode
function getFirstVisibleRawIdx() {
  const chars = document.querySelectorAll('#readerContent .char');
  for (const char of chars) {
    const rect = char.getBoundingClientRect();
    if (rect.bottom >= 80) {
      return parseInt(char.dataset.rawIdx) || 0;
    }
  }
  return 0;
}

// Helper: scroll to a raw text index inside the editable (plain text) container
function scrollToRawIdxInEditable(rawIdx) {
  const container = document.getElementById('readerContent');
  // Walk text nodes, accumulating character offset to find the one containing rawIdx
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
  let cumulative = 0;
  let node;
  while (node = walker.nextNode()) {
    const text = node.textContent;
    const startIdx = cumulative;
    const endIdx = cumulative + text.length;
    if (rawIdx >= startIdx && rawIdx <= endIdx) {
      const range = document.createRange();
      const offset = Math.min(rawIdx - startIdx, text.length);
      range.setStart(node, offset);
      range.collapse(true);
      const rect = range.getBoundingClientRect();
      if (rect.top !== 0 || rect.left !== 0) {
        window.scrollTo(0, rect.top + window.scrollY - 80);
        return;
      }
    }
    cumulative = endIdx;
  }
}

// Helper: find the raw text index at the top of the viewport in editable mode
function getRawIdxAtViewportTopEditable() {
  const container = document.getElementById('readerContent');
  const containerRect = container.getBoundingClientRect();
  const tryY = Math.max(10, containerRect.top + 35);
  let targetNode = null, targetOffset = 0;

  if (document.caretRangeFromPoint) {
    const range = document.caretRangeFromPoint(50, tryY);
    if (range && range.startContainer.nodeType === 3) {
      targetNode = range.startContainer;
      targetOffset = range.startOffset;
    }
  }

  if (!targetNode) {
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
    targetNode = walker.nextNode();
    targetOffset = 0;
  }
  if (!targetNode) return 0;

  // Walk text nodes, accumulating offset to find the raw index of targetNode
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
  let cumulative = 0;
  let node;
  while (node = walker.nextNode()) {
    const text = node.textContent;
    if (node === targetNode) {
      return cumulative + Math.min(targetOffset, text.length);
    }
    cumulative += text.length;
  }
  return 0;
}

// Helper: scroll to a raw text index in reading mode (find nearest char span)
function scrollToRawIdxInReading(rawIdx) {
  const chars = document.querySelectorAll('#readerContent .char');
  let bestChar = null;
  let bestIdx = Infinity;
  for (const char of chars) {
    const idx = parseInt(char.dataset.rawIdx) || 0;
    if (idx >= rawIdx && idx < bestIdx) {
      bestIdx = idx;
      bestChar = char;
    }
  }
  if (!bestChar && chars.length > 0) {
    // Find the closest char before rawIdx
    let closestIdx = -1;
    for (const char of chars) {
      const idx = parseInt(char.dataset.rawIdx) || 0;
      if (idx <= rawIdx && idx > closestIdx) {
        closestIdx = idx;
        bestChar = char;
      }
    }
  }
  if (bestChar) {
    const rect = bestChar.getBoundingClientRect();
    window.scrollTo(0, rect.top + window.scrollY - 80);
  }
}

function enterEditMode() {
  isEditMode = true;
  if (isReadAloud) stopReadAloud();
  const container = document.getElementById('readerContent');
  // Record the pixel scroll position before editing (for exact restore on exit)
  container._scrollTopBeforeEdit = window.scrollY;
  // Also record the first visible character's raw index (for editing alignment)
  const firstVisibleIdx = getFirstVisibleRawIdx();
  // Switch to plain text editing: fill with rawText
  container.setAttribute('contenteditable', 'true');
  container.innerText = rawText;
  container.style.outline = '2px solid #4A90D9';
  container.style.borderRadius = '16px';
  // Scroll to the same text position after DOM settles
  requestAnimationFrame(() => {
    scrollToRawIdxInEditable(firstVisibleIdx);
  });
  // Update button text
  document.getElementById('headerEditBtn').textContent = '💾';
  document.getElementById('headerEditBtn').title = '保存';
  document.getElementById('headerEditBtn').style.background = '#4CAF50';
  document.getElementById('headerEditBtn').style.color = '#fff';
}

function exitEditMode() {
  const container = document.getElementById('readerContent');
  // Get the pixel scroll position saved when entering edit mode
  const savedWindowScroll = container._scrollTopBeforeEdit || 0;
  // Get edited text
  const newText = container.innerText;
  container.removeAttribute('contenteditable');
  container.style.outline = '';
  isEditMode = false;

  // Restore button
  document.getElementById('headerEditBtn').textContent = '✏';
  document.getElementById('headerEditBtn').title = '编辑';
  document.getElementById('headerEditBtn').style.background = '';
  document.getElementById('headerEditBtn').style.color = '';

  // Check if text changed
  if (newText !== rawText) {
    rawText = newText;
    // Re-render with char spans
    renderText(rawText);
    // Save to database
    if (currentArticleName) {
      dbSaveArticle(currentArticleName, rawText);
    }
  } else {
    // No change, just re-render to restore char spans
    renderText(rawText);
  }
  // Restore exact pixel scroll position (layout is identical if text unchanged)
  requestAnimationFrame(() => {
    window.scrollTo(0, savedWindowScroll);
  });
}

      req.onsuccess = () => resolve(req.result || null);

// Auto-detect language (Chinese vs English) and switch query engine + TTS language
// Detect if article text follows an alternating Chinese-English line pattern
function detectAlternateZhEn(text) {
  const lines = text.split(/\n/).filter(l => l.trim().length > 0);
  if (lines.length < 2) return null;

  // Classify each line: if >= 80% of non-whitespace, non-punctuation chars are English letters → English line, else Chinese
  function isEnLine(line) {
    let enCount = 0, total = 0;
    for (const ch of line) {
      if (/\s/.test(ch)) continue;
      if (/[a-zA-Z]/.test(ch)) { enCount++; total++; }
      else if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(ch)) { total++; }
      // punctuation is ignored for ratio
    }
    if (total === 0) return false;
    return enCount / total >= 0.8;
  }

  const types = lines.map(l => isEnLine(l) ? 'en' : 'zh');

  // Check if it strictly alternates (en,zh,en,zh,... or zh,en,zh,en,...)
  let matchCount = 0;
  for (let i = 1; i < types.length; i++) {
    if (types[i] !== types[i - 1]) matchCount++;
  }
  // For alternating pattern, matchCount should be lines.length - 1
  if (matchCount < lines.length - 2) return null; // allow at most 1 break in alternation

  // Determine first line type
  const firstType = types[0];
  // Build mapping: for each English line, find its paired Chinese line
  const enToZh = {};
  const zhToEn = {};
  for (let i = 0; i < lines.length; i++) {
    if (types[i] === 'en') {
      // paired Chinese is next line if next is zh, else previous line
      let pairedZh = null;
      if (i + 1 < lines.length && types[i + 1] === 'zh') pairedZh = lines[i + 1];
      else if (i - 1 >= 0 && types[i - 1] === 'zh') pairedZh = lines[i - 1];
      enToZh[i] = pairedZh;
    }
  }

  return { types, enToZh, firstType };
}

let currentAlternateMode = null; // null or { types, enToZh, firstType } from detectAlternateZhEn

async function detectAndSetLanguage(text) {
  // First, try to restore per-article language settings
  if (currentArticleName) {
    const saved = await loadArticleLangSettings(currentArticleName);
    if (saved) {
      applyArticleLangSettings(saved);
      return;
    }
  }
  // No saved settings: auto-detect
  let cnCount = 0, enCount = 0;
  for (const ch of text) {
    if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(ch)) cnCount++;
    else if (/[a-zA-Z]/.test(ch)) enCount++;
  }
  if (cnCount + enCount === 0) return; // no detectable chars
  const isEnglish = enCount > cnCount;
  const newEngine = isEnglish ? 'en' : 'zh';
  queryEngine = newEngine;
  document.getElementById('queryEngineSelect').value = newEngine;
  // Auto-switch TTS language
  const newLang = isEnglish ? 'en-US' : 'zh-CN';
  document.getElementById('speechLangSelect').value = newLang;
  populateVoices();
  // Switch to saved voice for this language, or use default
  if (voiceByLang[newLang]) {
    document.getElementById('speechVoiceSelect').value = voiceByLang[newLang];
  }
  // Save system settings to update voiceByLang mapping
  await saveSettings();
  // Save as this article's language settings
  await saveArticleLangSettings();
}

function renderText(text) {
  const container = document.getElementById('readerContent');
  // Set language mode class for paragraph indentation
  container.classList.toggle('zh-mode', queryEngine === 'zh');
  // Split into paragraphs for speaker icons
  const paragraphs = text.split(/\n/);

  // In alternate Zh-En mode, build a mapping of non-empty line indices
  let altMode = null;
  let nonEmptyIndices = []; // maps non-empty line index -> paragraph array index
  if (currentAlternateMode) {
    altMode = currentAlternateMode;
    for (let i = 0; i < paragraphs.length; i++) {
      if (paragraphs[i].trim().length > 0) nonEmptyIndices.push(i);
    }
  }

  let html = '';
  let rawIdx = 0; // track position in rawText
  let paraIndex = 0; // actual paragraph index (skipping empty lines)
  let nonEmptyIdx = 0; // index into non-emptyIndices (for alternate mode)

  for (let p = 0; p < paragraphs.length; p++) {
    const para = paragraphs[p];

    // Empty line = line break
    if (para.trim().length === 0) {
      html += '<span class="para-gap"></span>';
      rawIdx += para.length + 1; // +1 for the \n
      continue;
    }

    // In alternate mode, skip Chinese lines
    if (altMode) {
      const neIdx = nonEmptyIdx; // position in the non-empty filtered list
      nonEmptyIdx++;
      if (altMode.types[neIdx] === 'zh') {
        // Advance rawIdx same as normal: para.length for chars + 1 for \n
        rawIdx += para.length + 1;
        continue;
      }
    }

    const currentParaIdx = paraIndex;
    paraIndex++;

    // Start paragraph block wrapper for content-visibility optimization
    // Chinese mode: skip text-indent if original paragraph already has leading whitespace
    const hasLeadingSpace = queryEngine === 'zh' && /^\s/.test(para);
    html += `<div class="para-block${hasLeadingSpace ? ' no-indent' : ''}">`;

    // In alternate mode, wrap with zh-en-para for tooltip
    if (altMode) {
      const neIdx = nonEmptyIdx - 1; // the non-empty index for this English line
      const zhText = altMode.enToZh[neIdx] || '';
      // We'll close the wrapper after word count and checkbox
      html += `<span class="zh-en-para">`;
      // Store the zh text to append later; use a data attribute approach
      // Actually, let's build the content first, then close with tooltip
    }

    // Add paragraph speaker icon
    const paraStartRawIdx = rawIdx;
    html += `<span class="para-speaker" data-para-start="${paraStartRawIdx}" onclick="readFromPara(${paraStartRawIdx})" title="从此段开始朗读">🔈</span>`;

    // Render characters in this paragraph
    let engBuf = '';
    let engStartIdx = 0;
    function flushEngBuf() {
      if (engBuf) {
        const ew = engBuf.trim();
        if (ew.length > 0) {
          const isCollected = isInFilteredCollection(ew);
          html += `<span class="char${isCollected ? ' collected' : ''}" data-char="${ew}" data-raw-idx="${engStartIdx}" onclick="openEnglishSpan(this)" style="cursor:pointer;">${escapeHtml(engBuf)}`;
          if (isCollected) {
            const pinyin = collections[ew].pinyin || '';
            const translation = collections[ew].translation || '';
            const note = collections[ew].note || '';
            const firstMeaning = getFirstChineseWord(translation);
            let tip = pinyin;
            if (firstMeaning) tip += (tip ? ' | ' : '') + firstMeaning;
            if (note) tip += (tip ? ' | ' : '') + note;
            html += `<span class="char-tooltip">${escapeHtml(tip)}</span>`;
          }
          html += '</span>';
        }
        engBuf = '';
      }
    }
    for (let i = 0; i < para.length; i++) {
      const ch = para[i];
      rawIdx++;
      if (ch === ' ' || ch === '\t' || ch === '\r') {
        flushEngBuf();
        html += ch;
      } else {
        const isCJK = /[\u4e00-\u9fff\u3400-\u4dbf]/.test(ch);
        const isEng = /[a-zA-Z'-]/.test(ch);
        if (isCJK) {
          flushEngBuf();
          const isCollected = isInFilteredCollection(ch);
          html += `<span class="char${isCollected ? ' collected' : ''}" data-char="${ch}" data-raw-idx="${rawIdx - 1}" onclick="openCharModal(this)">${ch}`;
          if (isCollected) {
            const pinyin = collections[ch].pinyin || '';
            const note = collections[ch].note || '';
            let tip = pinyin;
            if (note) tip += ' | ' + note;
            html += `<span class="char-tooltip">${escapeHtml(tip)}</span>`;
          }
          html += '</span>';
        } else if (isEng && queryEngine === 'en') {
          if (!engBuf) engStartIdx = rawIdx - 1;
          engBuf += ch;
        } else {
          flushEngBuf();
          html += escapeHtml(ch);
        }
      }
    }
    flushEngBuf();

    // Add word count (superscript, small font)
    const wordCount = countWordsWithoutPunctuation(para);
    if (altMode) {
      const neIdx = nonEmptyIdx - 1;
      const zhText = altMode.enToZh[neIdx] || '';
      html += `<span class="para-word-count zh-en-toggle" onclick="toggleZhEnTranslation(this)">${wordCount}字</span>`;
      html += `<span class="zh-en-tooltip">${escapeHtml(zhText)}</span>`;
    } else {
      html += `<span class="para-word-count">${wordCount}字</span>`;
    }

    // Add checkbox with date as title
    const record = getParaReadRecord(currentArticleName, currentParaIdx);
    const isChecked = record ? 'checked disabled' : '';
    const dateTitle = record ? ` title="${record.date} 已读"` : '';
    html += `<input type="checkbox" class="para-checkbox" data-para-index="${currentParaIdx}" data-word-count="${wordCount}" ${isChecked}${dateTitle} onchange="onParaCheckboxChange(this)">`;

    // Close zh-en-para wrapper
    if (altMode) {
      html += `</span>`;
    }

    // Close paragraph block wrapper
    html += `</div>`;

    // Add line break after paragraph (unless last)
    if (p < paragraphs.length - 1) {
      html += '<span class="para-gap"></span>';
      rawIdx++; // for the \n
    }
  }
  container.innerHTML = html;

  // Highlight collected multi-char words in the text
  highlightCollectedWords();
}

async function onParaCheckboxChange(checkbox) {
  if (!checkbox.checked) {
    // Prevent unchecking - re-check it
    checkbox.checked = true;
    return;
  }
  const paraIndex = parseInt(checkbox.dataset.paraIndex);
  const wordCount = parseInt(checkbox.dataset.wordCount);

  // Check if there are unread paragraphs before this one
  const allCheckboxes = document.querySelectorAll('.para-checkbox');
  const unreadBefore = [];
  allCheckboxes.forEach(cb => {
    const idx = parseInt(cb.dataset.paraIndex);
    if (idx < paraIndex && !cb.checked) {
      unreadBefore.push(cb);
    }
  });

  if (unreadBefore.length > 0) {
    const confirmed = confirm('是否将此段前所有未读段落都标记为已读？\n选择"取消"则只标记当前段。');
    if (confirmed) {
      for (const cb of unreadBefore) {
        const idx = parseInt(cb.dataset.paraIndex);
        const wc = parseInt(cb.dataset.wordCount);
        cb.checked = true;
        cb.disabled = true;
        cb.title = getTodayStr() + ' 已读';
        await saveParaReadRecord(currentArticleName, idx, wc);
      }
    }
  }

  // Save current paragraph record
  await saveParaReadRecord(currentArticleName, paraIndex, wordCount);

  // Disable checkbox (cannot uncheck) and set date title
  checkbox.disabled = true;
  checkbox.title = getTodayStr() + ' 已读';

  // Update stats display
  updateReadStatsDisplay();
}

function highlightCollectedWords() {
  const wordKeys = Object.keys(collections).filter(k => k.length > 1 && isInFilteredCollection(k));
  if (wordKeys.length === 0) return;

  const chars = document.querySelectorAll('#readerContent .char');
  if (chars.length === 0) return;

  const charList = Array.from(chars);
  const text = charList.map(span => span.dataset.char).join('');

  for (const word of wordKeys) {
    // English multi-word phrase (contains space): match consecutive word spans separated by space text nodes
    if (word.indexOf(' ') !== -1) {
      const parts = word.split(' ');
      for (let si = 0; si <= charList.length - parts.length; si++) {
        let match = true;
        for (let p = 0; p < parts.length; p++) {
          if (!charList[si + p] || charList[si + p].dataset.char !== parts[p]) {
            match = false; break;
          }
          // Check that word spans are adjacent (only whitespace between them)
          if (p > 0) {
            const prevSpan = charList[si + p - 1];
            const currSpan = charList[si + p];
            const between = document.createRange();
            between.setStartAfter(prevSpan);
            between.setEndBefore(currSpan);
            const betweenText = between.toString();
            if (!/^\s*$/.test(betweenText)) { match = false; break; }
          }
        }
        if (match) {
          for (let p = 0; p < parts.length; p++) {
            charList[si + p].classList.add('collected', 'collected-phrase');
            if (isInFilteredCollection(parts[p])) charList[si + p].classList.add('collected-single');
          }
        }
      }
      continue;
    }

    let idx = 0;
    while ((idx = text.indexOf(word, idx)) !== -1) {
      // For English word span (one span = whole word), match directly
      if (charList[idx] && charList[idx].dataset.char === word) {
        charList[idx].classList.add('collected', 'collected-phrase');
      } else {
        // For Chinese multi-char word: highlight each individual char span,
        // but only if the word fits within consecutive single-char spans
        let valid = true;
        for (let i = 0; i < word.length; i++) {
          if (!charList[idx + i] || charList[idx + i].dataset.char.length > 1) {
            valid = false;
            break;
          }
        }
        if (valid) {
          for (let i = 0; i < word.length; i++) {
            const span = charList[idx + i];
            span.classList.add('collected', 'collected-phrase');
            if (isInFilteredCollection(span.dataset.char)) span.classList.add('collected-single');
          }
        }
      }
      idx += 1;
    }
  }
}

function openCharModal(el) {
  // In edit mode, do not open char modal
  if (isEditMode) return;
  // Support both DOM element and plain char string
  let ch, isElement = false;
  if (typeof el === 'string') {
    ch = el;
    // Close existing modal when opened from collection
    closeModal();
  } else {
    ch = el.dataset.char;
    isElement = true;
  }
  if (!ch) return;

  // If this char is part of a word selection, open word modal instead
  if (isElement && el.classList.contains('word-selection') && el.dataset.selectedWord) {
    openWordModal(el.dataset.selectedWord);
    return;
  }

  currentChar = ch;

  // Find paragraph start index in rawText (only when clicking from reader)
  if (isElement && rawText) {
    const allChars = document.querySelectorAll('#readerContent .char');
    const charIndex = Array.from(allChars).indexOf(el);
    if (charIndex >= 0) {
      let domIdx = 0;
      for (let i = 0; i < rawText.length; i++) {
        if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(rawText[i])) {
          if (domIdx === charIndex) {
            let paraStart = i;
            while (paraStart > 0 && rawText[paraStart - 1] !== '\n') paraStart--;
            while (paraStart < rawText.length && (rawText[paraStart] === ' ' || rawText[paraStart] === '\t')) paraStart++;
            lastReadStartIndex = paraStart;
            break;
          }
          domIdx++;
        }
      }
    }
  }

  document.getElementById('modalChar').textContent = ch;
  // Restore note: prefer active collection, fall back to saved removed note
  const restoredNote = collections[ch] ? (collections[ch].note || '') : (removedNotes[ch] || '');
  document.getElementById('modalNotes').value = restoredNote;

  // Update labels for Chinese
  document.getElementById('modalPinyinLabel').textContent = '汉语拼音';

  // Star state
  const starBtn = document.getElementById('modalStar');
  starBtn.textContent = collections[ch] ? '★' : '☆';

function clearWordSelection() {

function handleTextSelection(e) {
  const selection = window.getSelection();
  if (!selection || selection.isCollapsed || selection.rangeCount === 0) return;

  const selectedText = selection.toString().trim();

  if (queryEngine === 'en') {
    // English mode: detect English words, highlight them like Chinese word selection
    const engWords = selectedText.match(/[a-zA-Z'-]+/g);
    if (!engWords || engWords.length === 0) return;
    const word = engWords.join(' ').trim();
    if (word.length < 2) return;
    clearWordSelection();

    // Find all .char spans within the selection range and highlight them
    const range = selection.getRangeAt(0);
    const chars = [];
    document.querySelectorAll('#readerContent .char').forEach(span => {
      const spanRange = document.createRange();
      spanRange.selectNodeContents(span);
      const isBefore = range.compareBoundaryPoints(Range.START_TO_END, spanRange) < 0;
      const isAfter = range.compareBoundaryPoints(Range.END_TO_START, spanRange) > 0;
      if (!isBefore && !isAfter) chars.push(span);
    });
    if (chars.length < 1) return;

    chars.forEach(span => {
      span.classList.add('word-selection');
      span.dataset.selectedWord = word;
    });
    selection.removeAllRanges();
    justSelectedWord = true;
    e.stopPropagation();
    return;
  }

  // Chinese mode: Filter only CJK chars
  const cjkText = selectedText.replace(/[^\u4e00-\u9fff\u3400-\u4dbf]/g, '');
  if (cjkText.length < 2) return;

  // Clear previous selection highlight
  clearWordSelection();

  // Find all .char spans within the selection range
  const range = selection.getRangeAt(0);
  const chars = [];
  // Walk through all char spans in readerContent and check if inside range
  document.querySelectorAll('#readerContent .char').forEach(span => {
    const spanRange = document.createRange();
    spanRange.selectNodeContents(span);
    // Check overlap
    const isBefore = range.compareBoundaryPoints(Range.START_TO_END, spanRange) < 0;
    const isAfter = range.compareBoundaryPoints(Range.END_TO_START, spanRange) > 0;
    if (!isBefore && !isAfter) {
      chars.push(span);
    }
  });

  if (chars.length < 2) return;

  // Highlight and attach click handler
  chars.forEach(span => {
    span.classList.add('word-selection');
    span.dataset.selectedWord = cjkText;
  });

  // Clear native selection
  selection.removeAllRanges();

  // Mark that a word was just selected so the upcoming click event
  // knows not to clear the highlight immediately
  justSelectedWord = true;

  // Prevent the click event from opening single-char modal immediately
  // (the click will be handled by the .word-selection handler instead)
  e.stopPropagation();
}

async function fetchWordInfo(word) {
  let pinyin = '';

  // Priority 1: local pinyin-pro
  try {
    if (window.pinyinPro && typeof window.pinyinPro.pinyin === 'function') {
      pinyin = window.pinyinPro.pinyin(word) || '';
    }
  } catch (e) {}

  // Try moedict for word definition (moedict supports multi-char entries)
  let defText = '';
  try {
    const res = await fetch(`https://www.moedict.tw/raw/${encodeURIComponent(word)}`);
    if (res.ok) {
      const data = await res.json();
      const defs = data.heteronyms && data.heteronyms[0] && data.heteronyms[0].definitions;
      if (defs && defs.length) {
        defs.forEach((d, i) => {
          if (d.type) defText += `【${d.type}】`;
          defText += d.def;
          if (d.example) defText += `\n例：${d.example}`;
          if (i < defs.length - 1) defText += '\n';
        });
      }
      // Use online pinyin if local missing
      if (!pinyin) {
        pinyin = (data.heteronyms && data.heteronyms[0] && data.heteronyms[0].pinyin) || '';
      }
    }
  } catch (err) {
    console.error('Word dictionary fetch error:', err);
  }

  // Fallback: query each char separately
  if (!defText) {
    const charDefs = [];
    for (const ch of word) {
      if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(ch)) {
        try {
          const res = await fetch(`https://www.moedict.tw/raw/${encodeURIComponent(ch)}`);
          if (res.ok) {
            const data = await res.json();
            const defs = data.heteronyms && data.heteronyms[0] && data.heteronyms[0].definitions;
            if (defs && defs.length) {
              const firstDef = defs[0];
              let d = firstDef.def;
              if (firstDef.type) d = `【${firstDef.type}】${d}`;
              charDefs.push(`${ch}：${d}`);
            }
          }
        } catch (e) {}
      }
    }
    if (charDefs.length) {
      defText = charDefs.join('\n');
    }
  }

  // Fallback pinyin
  if (!pinyin) {
    try {
      const pyRes = await fetch(`https://pinyinapi.sstration.cn/api/v1/pinyin/${encodeURIComponent(word)}`);
      if (pyRes.ok) {
        const pyData = await pyRes.json();
        if (pyData && pyData.pinyin) pinyin = pyData.pinyin;
      }
    } catch (e) {}
  }

  // Display pinyin
  if (currentChar === word) {
    document.getElementById('modalPinyin').textContent = pinyin || '未知';
    document.getElementById('modalDefinition').textContent = defText || '暂无释义';
  }

  // Auto-collect (respect user setting)
  const autoCollect = document.getElementById('autoCollectCheckbox');
  if (pinyin && autoCollect && autoCollect.checked) {
    autoCollectChar(word, pinyin);
  } else if (collections[word] && pinyin) {
    collections[word].pinyin = pinyin;
    persistCollections();
    updateCharTooltip(word);
  }
}

function speakSingleChar(ch) {
  if (!ch || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(ch);
  
  const systemLang = document.getElementById('speechLangSelect').value;
  const hasChinese = /[\u4e00-\u9fa5]/.test(ch);
  let useLang = systemLang;
  
  if (hasChinese && systemLang !== 'zh-CN') {
    useLang = 'zh-CN';
  } else if (!hasChinese && systemLang !== 'en-US') {
    useLang = 'en-US';
  }
  
  utt.lang = useLang;
  utt.rate = parseFloat(document.getElementById('speechRateRange').value);
  utt.pitch = 1;
  
  if (useLang === systemLang) {
    const voiceName = document.getElementById('speechVoiceSelect').value;
    if (voiceName) {
      const voice = speechVoices.find(v => v.name === voiceName);
      if (voice) utt.voice = voice;
    }
  } else {
    if (voiceByLang[useLang]) {
      const savedVoice = speechVoices.find(v => v.name === voiceByLang[useLang]);
      if (savedVoice) utt.voice = savedVoice;
    }
    if (!utt.voice) {
      const defaultVoice = speechVoices.find(v => v.lang.startsWith(useLang.split('-')[0]));
      if (defaultVoice) utt.voice = defaultVoice;
    }
  }
  
  window.speechSynthesis.speak(utt);
}
