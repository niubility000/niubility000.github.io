<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #e0e0e0;
            overflow: hidden;
        }

        /* ===== 首页用户选择 ===== */
        .user-select {
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        .user-select.hidden {
            display: none;
        }

        .user-select h1 {
            font-size: 2.8rem;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 6px;
        }

        .user-cards {
            display: flex;
            gap: 32px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .user-card {
            width: 220px;
            padding: 32px 24px;
            border: 1px solid #1a3a4a;
            border-radius: 12px;
            background: linear-gradient(135deg, #111827, #1f2937);
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
        }

        .user-card:hover {
            transform: translateY(-6px) scale(1.03);
            border-color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
        }

        .user-card:active {
            transform: translateY(-2px) scale(0.98);
        }

        .user-card .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: linear-gradient(135deg, #0d2b1f, #1a4a3a);
            border: 2px solid #00ff88;
        }

        .user-card .name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #e0e0e0;
            margin-bottom: 8px;
        }

        .user-card .best-label {
            font-size: 0.9rem;
            color: #888;
        }

        .user-card .best-value {
            font-size: 1.6rem;
            color: #00ff88;
            font-weight: bold;
            margin-top: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 游戏页 ===== */
        /* 桌面版：A左 B中 C右，三栏 flex，高度 100vh */
        .game-page {
            position: relative;
            animation: fadeIn 0.3s ease;
            display: flex;
            align-items: stretch;
            height: 100vh;
            padding: 8px 12px;
            gap: 12px;
            overflow: hidden;
        }

        .game-page.hidden { display: none; }

        /* A: 左侧信息栏 */
        .game-sidebar-left {
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
            overflow: hidden;
        }

        .game-sidebar-left .game-header {
            justify-content: flex-start;
            gap: 8px;
            margin-bottom: 0;
        }

        .game-sidebar-left .game-header h1 {
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .game-sidebar-left .score-bar {
            justify-content: flex-start;
            margin-bottom: 0;
            gap: 16px;
            font-size: 1rem;
        }

        .game-sidebar-left .controls {
            margin-top: 0;
            justify-content: flex-start;
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
        }

        .game-sidebar-left .controls button {
            width: 100%;
            text-align: left;
            padding: 8px 14px;
            font-size: 0.9rem;
        }

        .game-sidebar-left .hint {
            margin-top: 0;
            font-size: 0.78rem;
        }

        /* B: 中间游戏区 */
        .game-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            padding: 0;
        }

        /* 桌面版 wrapper：高度优先撑满，正方形 */
        .game-center > div {
            position: relative;
            height: calc(100vh - 16px);
            aspect-ratio: 1;
            max-width: 100%;
            max-height: 100%;
        }

        /* C: 右侧方向键 */
        .game-sidebar-right {
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            padding: 6px 16px;
            font-size: 0.9rem;
            border: 1px solid #1a3a4a;
            border-radius: 6px;
            background: linear-gradient(135deg, #111827, #1f2937);
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .back-btn:hover {
            border-color: #ff4466;
            color: #ff4466;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            letter-spacing: 4px;
        }

        .current-user {
            font-size: 0.95rem;
            color: #888;
        }

        .current-user strong {
            color: #00ccff;
        }

        .score-bar {
            display: flex;
            gap: 40px;
            font-size: 1.1rem;
        }

        .score-bar span {
            color: #aaa;
        }

        .score-bar .value {
            color: #00ff88;
            font-weight: bold;
            font-size: 1.3rem;
            margin-left: 6px;
        }

        canvas {
            border: 2px solid #00ccff;
            border-radius: 8px;
            background: #0d1117;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.08), inset 0 0 60px rgba(0, 0, 0, 0.5);
            display: block;
            width: 100%;
            height: 100%;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 28px;
            font-size: 1rem;
            border: 1px solid #1a3a4a;
            border-radius: 6px;
            background: linear-gradient(135deg, #111827, #1f2937);
            color: #00ff88;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        button:hover {
            background: linear-gradient(135deg, #1f2937, #374151);
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        button:active {
            transform: scale(0.97);
        }

        button.active {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #0a0a1a;
            font-weight: bold;
            border-color: #00ff88;
        }

        .hint {
            font-size: 0.85rem;
            color: #555;
        }

        .hint kbd {
            background: #1a2a3a;
            border: 1px solid #2a3a4a;
            border-radius: 4px;
            padding: 2px 7px;
            font-size: 0.8rem;
            color: #aaa;
        }

        /* Touch controls */
        .touch-controls {
            user-select: none;
        }

        .touch-grid {
            display: grid;
            grid-template-columns: repeat(3, 72px);
            grid-template-rows: repeat(3, 72px);
            gap: 6px;
            justify-content: center;
        }

        .touch-btn {
            width: 72px;
            height: 72px;
            border-radius: 12px;
            background: #1a2a3a;
            border: 1px solid #2a4a5a;
            color: #00ff88;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: all 0.1s;
        }

        .touch-btn:hover {
            background: #2a3a4a;
            border-color: #00ff88;
        }

        .touch-btn:active {
            background: #00ff88;
            color: #0a0a1a;
            transform: scale(0.95);
        }

        .touch-placeholder {
            visibility: hidden;
        }

        /* ===== 手机版：A上 B中 C下，三栏垂直 ===== */
        @media (max-width: 700px) {
            .game-page {
                flex-direction: column;
                padding: 8px;
                gap: 8px;
                width: 100vw;
            }
            /* A: 顶部信息栏 */
            .game-sidebar-left {
                width: 100%;
                flex-shrink: 0;
                text-align: center;
                align-items: center;
            }
            .game-sidebar-left .game-header {
                justify-content: center;
            }
            .game-sidebar-left .game-header h1 {
                font-size: 1.4rem;
            }
            .game-sidebar-left .score-bar {
                justify-content: center;
                gap: 24px;
                font-size: 1rem;
            }
            .game-sidebar-left .current-user {
                font-size: 0.85rem;
            }
            .game-sidebar-left .controls {
                flex-direction: row;
                justify-content: center;
                align-items: center;
            }
            .game-sidebar-left .controls button {
                width: auto;
                text-align: center;
                padding: 6px 16px;
                font-size: 0.85rem;
            }
            .game-sidebar-left .hint {
                display: none;
            }
            /* B: 中间游戏区 — 占满剩余空间 */
            .game-center {
                flex: 1;
                min-height: 0;
                width: 100%;
            }
            /* 手机版 wrapper：宽度优先撑满，正方形 */
            .game-center > div {
                width: 100%;
                aspect-ratio: 1;
                max-height: 100%;
            }
            /* C: 底部方向键 */
            .game-sidebar-right {
                justify-content: center;
                flex-shrink: 0;
                height: 30%;
                align-items: start;
            }
            .touch-grid {
                grid-template-columns: repeat(3, 52px);
                grid-template-rows: repeat(3, 52px);
                gap: 4px;
            }
            .touch-btn {
                width: 52px;
                height: 52px;
                font-size: 1.2rem;
                border-radius: 8px;
            }
            h1 { font-size: 1.5rem; }
            .user-cards { gap: 16px; }
            .user-card { width: 160px; padding: 24px 16px; }
        }

        /* Overlay */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .overlay.hidden { display: none; }

        .overlay h2 {
            font-size: clamp(1.2rem, 6vmin, 3rem);
            color: #00ff88;
            margin-bottom: 10px;
        }

        .overlay p {
            color: #aaa;
            margin-bottom: 20px;
            font-size: clamp(0.85rem, 3vmin, 1.5rem);
        }

        .overlay button {
            font-size: clamp(0.85rem, 3vmin, 1.2rem);
            padding: clamp(6px, 2vmin, 14px) clamp(16px, 5vmin, 36px);
        }
    </style>
</head>
<body>
    <!-- 首页：用户选择 -->
    <div class="user-select" id="userSelect">
        <h1>🐍 贪吃蛇</h1>
        <div class="user-cards">
            <div class="user-card" onclick="enterGame('user1')">
                <div class="avatar">🎮</div>
                <div class="name">用户一</div>
                <div class="best-label">最高分</div>
                <div class="best-value" id="bestUser1">0</div>
            </div>
            <div class="user-card" onclick="enterGame('user2')">
                <div class="avatar">🕹️</div>
                <div class="name">用户二</div>
                <div class="best-label">最高分</div>
                <div class="best-value" id="bestUser2">0</div>
            </div>
        </div>
    </div>

    <!-- 游戏页 -->
    <div class="game-page hidden" id="gamePage">
        <!-- 左侧信息栏 -->
        <div class="game-sidebar-left">
            <div class="game-header">
                <button class="back-btn" onclick="backToHome()">← 返回首页</button>
                <h1>🐍 贪吃蛇</h1>
            </div>
            <div class="current-user" id="currentUserDisplay">当前玩家：<strong>用户一</strong></div>
            <div class="score-bar">
                <div><span>得分</span><span class="value" id="score">0</span></div>
                <div><span>最高分</span><span class="value" id="best">0</span></div>
            </div>
            <div class="controls">
                <button id="btnSound" onclick="toggleSound()" class="active">🔊 音效开</button>
                <button id="btnSpeed" onclick="cycleSpeed()">速度: 正常</button>
            </div>
            <p class="hint">
                <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动<br>
                <kbd>空格</kbd> 暂停 &nbsp; <kbd>Enter</kbd> 开始
            </p>
        </div>
        <!-- 中间画布 - 最大化居中 -->
        <div class="game-center">
            <div>
                <canvas id="gameCanvas" width="480" height="480"></canvas>
                <div class="overlay" id="overlay">
                    <h2 id="overlayTitle">贪吃蛇</h2>
                    <p id="overlayMsg">按空格键或点击"开始"按钮</p>
                    <button onclick="startGame()" class="active">开始游戏</button>
                </div>
            </div>
        </div>
        <!-- 右侧方向按钮 -->
        <div class="game-sidebar-right">
            <div class="touch-controls">
                <div class="touch-grid">
                    <div class="touch-placeholder"></div>
                    <div class="touch-btn" ontouchstart="setDir(0,-1)" onclick="setDir(0,-1)">▲</div>
                    <div class="touch-placeholder"></div>
                    <div class="touch-btn" ontouchstart="setDir(-1,0)" onclick="setDir(-1,0)">◀</div>
                    <div class="touch-btn" id="btnPause" ontouchstart="togglePause()" onclick="togglePause()">⏸</div>
                    <div class="touch-btn" ontouchstart="setDir(1,0)" onclick="setDir(1,0)">▶</div>
                    <div class="touch-placeholder"></div>
                    <div class="touch-btn" ontouchstart="setDir(0,1)" onclick="setDir(0,1)">▼</div>
                    <div class="touch-placeholder"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // ============ User System ============
    let currentUser = null; // 'user1' | 'user2'

    function loadUserBest(user) {
        return parseInt(localStorage.getItem('snake_best_' + user) || '0');
    }

    function saveUserBest(user, score) {
        localStorage.setItem('snake_best_' + user, String(score));
    }

    function loadUserSpeed(user) {
        const saved = localStorage.getItem('snake_speed_' + user);
        if (saved !== null) {
            const idx = parseInt(saved);
            if (idx >= 0 && idx < SPEEDS.length) return idx;
        }
        return 0; // 默认超慢
    }

    function saveUserSpeed(user, idx) {
        localStorage.setItem('snake_speed_' + user, String(idx));
    }

    function updateHomeBest() {
        document.getElementById('bestUser1').textContent = loadUserBest('user1');
        document.getElementById('bestUser2').textContent = loadUserBest('user2');
    }

    function enterGame(user) {
        currentUser = user;
        const userName = user === 'user1' ? '用户一' : '用户二';
        document.getElementById('currentUserDisplay').innerHTML = '当前玩家：<strong>' + userName + '</strong>';
        document.getElementById('userSelect').classList.add('hidden');
        document.getElementById('gamePage').classList.remove('hidden');

        best = loadUserBest(currentUser);
        document.getElementById('best').textContent = best;

        // 加载该用户保存的速度
        speedIdx = loadUserSpeed(currentUser);
        document.getElementById('btnSpeed').textContent = '速度: ' + SPEEDS[speedIdx].label;

        // 重置游戏状态
        init();
        state = 'idle';
        showOverlay('贪吃蛇', '按空格键或点击"开始"按钮');
        draw();
    }

    function backToHome() {
        // 停止游戏循环
        if (gameLoop) {
            clearInterval(gameLoop);
            gameLoop = null;
        }
        state = 'idle';
        currentUser = null;
        document.getElementById('gamePage').classList.add('hidden');
        document.getElementById('userSelect').classList.remove('hidden');
        updateHomeBest();
    }

    // ============ Audio Engine (Web Audio API) ============
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    let soundEnabled = true;

    function ensureAudio() {
        if (!audioCtx) audioCtx = new AudioCtx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTone(freq, duration, type = 'square', volume = 0.12, slide = 0) {
        if (!soundEnabled) return;
        ensureAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slide) osc.frequency.linearRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // 音效定义
    function sfxEat() {
        playTone(520, 0.08, 'square', 0.15);
        setTimeout(() => playTone(780, 0.1, 'square', 0.12), 50);
        setTimeout(() => playTone(1040, 0.12, 'sine', 0.1), 100);
    }

    function sfxDie() {
        playTone(400, 0.15, 'sawtooth', 0.15, -200);
        setTimeout(() => playTone(200, 0.2, 'sawtooth', 0.12, -100), 100);
        setTimeout(() => playTone(100, 0.4, 'sawtooth', 0.1), 200);
    }

    function sfxMove() {
        playTone(180, 0.03, 'sine', 0.03);
    }

    function sfxStart() {
        playTone(330, 0.1, 'square', 0.1);
        setTimeout(() => playTone(440, 0.1, 'square', 0.1), 80);
        setTimeout(() => playTone(660, 0.15, 'square', 0.12), 160);
    }

    function sfxPause() {
        playTone(440, 0.1, 'sine', 0.08);
        setTimeout(() => playTone(330, 0.15, 'sine', 0.06), 80);
    }

    function sfxBonus() {
        playTone(600, 0.08, 'square', 0.13);
        setTimeout(() => playTone(800, 0.08, 'square', 0.12), 60);
        setTimeout(() => playTone(1000, 0.08, 'square', 0.1), 120);
        setTimeout(() => playTone(1200, 0.15, 'sine', 0.1), 180);
    }

    // ============ Game Config ============
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const CELL = 24;
    const COLS = canvas.width / CELL;   // 20
    const ROWS = canvas.height / CELL;  // 20

    const SPEEDS = [
        { label: '超慢', interval: 600 },
        { label: '慢速', interval: 300 },
        { label: '正常', interval: 120 },
        { label: '快速', interval: 70 },
        { label: '极速', interval: 40 },
    ];
    let speedIdx = 0;

    let snake, dir, nextDir, food, bonusFood, score, best, gameLoop, state;
    // state: 'idle' | 'playing' | 'paused' | 'dead'

    best = 0;

    function init() {
        snake = [
            { x: 5, y: 10 },
            { x: 4, y: 10 },
            { x: 3, y: 10 },
        ];
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        score = 0;
        bonusFood = null;
        document.getElementById('score').textContent = '0';
        spawnFood();
    }

    function spawnFood() {
        let pos;
        do {
            pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
        } while (isOnSnake(pos) || (bonusFood && pos.x === bonusFood.x && pos.y === bonusFood.y));
        food = pos;
    }

    function spawnBonusFood() {
        if (bonusFood) return;
        let pos;
        do {
            pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
        } while (isOnSnake(pos) || (pos.x === food.x && pos.y === food.y));
        bonusFood = pos;
        // 奖励食物5秒后消失
        setTimeout(() => { bonusFood = null; }, 5000);
    }

    function isOnSnake(pos) {
        return snake.some(s => s.x === pos.x && s.y === pos.y);
    }

    // ============ Game Loop ============
    function startGame() {
        ensureAudio();
        init();
        state = 'playing';
        hideOverlay();
        sfxStart();
        if (gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(tick, SPEEDS[speedIdx].interval);
    }

    function tick() {
        if (state !== 'playing') return;

        dir = { ...nextDir };
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        // 碰墙检测
        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
            return die();
        }
        // 碰自身检测
        if (isOnSnake(head)) {
            return die();
        }

        snake.unshift(head);
        sfxMove();

        let ate = false;
        // 吃普通食物
        if (head.x === food.x && head.y === food.y) {
            score += 10;
            ate = true;
            sfxEat();
            spawnFood();
            // 每吃5个普通食物出现奖励食物
            if (score % 50 === 0) spawnBonusFood();
        }
        // 吃奖励食物
        else if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
            score += 50;
            ate = true;
            sfxBonus();
            bonusFood = null;
        }

        if (!ate) {
            snake.pop();
        }

        document.getElementById('score').textContent = score;
        draw();
    }

    function die() {
        state = 'dead';
        clearInterval(gameLoop);
        gameLoop = null;
        sfxDie();
        if (currentUser && score > best) {
            best = score;
            saveUserBest(currentUser, best);
            document.getElementById('best').textContent = best;
        }
        draw();
        setTimeout(() => showOverlay('游戏结束', `得分: ${score}`), 300);
    }

    // ============ Drawing ============
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 网格
        ctx.strokeStyle = 'rgba(0,200,255,0.5)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= COLS; i++) {
            ctx.beginPath();
            ctx.moveTo(i * CELL, 0);
            ctx.lineTo(i * CELL, canvas.height);
            ctx.stroke();
        }
        for (let j = 0; j <= ROWS; j++) {
            ctx.beginPath();
            ctx.moveTo(0, j * CELL);
            ctx.lineTo(canvas.width, j * CELL);
            ctx.stroke();
        }

        // 蛇身
        snake.forEach((seg, i) => {
            const t = i / snake.length;
            const r = Math.round(0 + t * 0);
            const g = Math.round(255 - t * 120);
            const b = Math.round(136 - t * 80);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            const pad = i === 0 ? 1 : 2;
            const radius = i === 0 ? 6 : 4;
            roundRect(ctx, seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, radius);
            ctx.fill();

            // 蛇眼睛
            if (i === 0) {
                ctx.fillStyle = '#0a0a1a';
                const cx = seg.x * CELL + CELL / 2;
                const cy = seg.y * CELL + CELL / 2;
                const eyeOff = 4;
                if (dir.x === 1) {
                    ctx.beginPath(); ctx.arc(cx + 3, cy - eyeOff, 2.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx + 3, cy + eyeOff, 2.5, 0, Math.PI * 2); ctx.fill();
                } else if (dir.x === -1) {
                    ctx.beginPath(); ctx.arc(cx - 3, cy - eyeOff, 2.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx - 3, cy + eyeOff, 2.5, 0, Math.PI * 2); ctx.fill();
                } else if (dir.y === -1) {
                    ctx.beginPath(); ctx.arc(cx - eyeOff, cy - 3, 2.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx + eyeOff, cy - 3, 2.5, 0, Math.PI * 2); ctx.fill();
                } else {
                    ctx.beginPath(); ctx.arc(cx - eyeOff, cy + 3, 2.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx + eyeOff, cy + 3, 2.5, 0, Math.PI * 2); ctx.fill();
                }
            }
        });

        // 普通食物
        const pulse = Math.sin(Date.now() / 200) * 0.15 + 0.85;
        ctx.save();
        ctx.translate(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2);
        ctx.scale(pulse, pulse);
        ctx.shadowColor = '#ff4466';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#ff4466';
        ctx.beginPath();
        ctx.arc(0, 0, CELL / 2 - 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();

        // 奖励食物
        if (bonusFood) {
            const bPulse = Math.sin(Date.now() / 150) * 0.2 + 0.8;
            ctx.save();
            ctx.translate(bonusFood.x * CELL + CELL / 2, bonusFood.y * CELL + CELL / 2);
            ctx.scale(bPulse, bPulse);
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 18;
            ctx.fillStyle = '#ffd700';
            // 星形
            drawStar(ctx, 0, 0, 5, CELL / 2 - 3, CELL / 4 - 1);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();
        }
    }

    function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
        let rot = Math.PI / 2 * 3;
        const step = Math.PI / spikes;
        ctx.beginPath();
        ctx.moveTo(cx, cy - outerR);
        for (let i = 0; i < spikes; i++) {
            ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
            rot += step;
            ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
            rot += step;
        }
        ctx.lineTo(cx, cy - outerR);
        ctx.closePath();
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    // ============ Overlay ============
    function showOverlay(title, msg) {
        document.getElementById('overlayTitle').textContent = title;
        document.getElementById('overlayMsg').textContent = msg;
        document.getElementById('overlay').classList.remove('hidden');
    }

    function hideOverlay() {
        document.getElementById('overlay').classList.add('hidden');
    }

    // ============ Controls ============
    function setDir(x, y) {
        // 防止180度掉头
        if (dir.x + x === 0 && dir.y + y === 0) return;
        nextDir = { x, y };
    }

    function togglePause() {
        const btn = document.getElementById('btnPause');
        if (state === 'playing') {
            state = 'paused';
            clearInterval(gameLoop);
            gameLoop = null;
            sfxPause();
            showOverlay('暂停', '按空格键继续');
            btn.textContent = '▶';
        } else if (state === 'paused') {
            state = 'playing';
            hideOverlay();
            sfxStart();
            gameLoop = setInterval(tick, SPEEDS[speedIdx].interval);
            btn.textContent = '⏸';
        }
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        const btn = document.getElementById('btnSound');
        btn.textContent = soundEnabled ? '🔊 音效开' : '🔇 音效关';
        btn.classList.toggle('active', soundEnabled);
    }

    function cycleSpeed() {
        speedIdx = (speedIdx + 1) % SPEEDS.length;
        const btn = document.getElementById('btnSpeed');
        btn.textContent = '速度: ' + SPEEDS[speedIdx].label;
        // 持久化保存当前用户的速度选择
        if (currentUser) {
            saveUserSpeed(currentUser, speedIdx);
        }
        // 如果正在游戏中，重新设置循环
        if (state === 'playing' && gameLoop) {
            clearInterval(gameLoop);
            gameLoop = setInterval(tick, SPEEDS[speedIdx].interval);
        }
    }

    document.addEventListener('keydown', e => {
        const key = e.key;
        if (key === 'ArrowUp'    || key === 'w' || key === 'W') { e.preventDefault(); setDir(0, -1); }
        if (key === 'ArrowDown'  || key === 's' || key === 'S') { e.preventDefault(); setDir(0,  1); }
        if (key === 'ArrowLeft'  || key === 'a' || key === 'A') { e.preventDefault(); setDir(-1, 0); }
        if (key === 'ArrowRight' || key === 'd' || key === 'D') { e.preventDefault(); setDir(1,  0); }
        if (key === ' ') {
            e.preventDefault();
            if (state === 'idle' || state === 'dead') startGame();
            else togglePause();
        }
        if (key === 'Enter') {
            e.preventDefault();
            if (state === 'idle' || state === 'dead' || state === 'paused') {
                if (state === 'paused') { state = 'playing'; hideOverlay(); }
                startGame();
            }
        }
    });

    // 触摸滑动支持
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });

    canvas.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
        if (Math.abs(dx) > Math.abs(dy)) {
            setDir(dx > 0 ? 1 : -1, 0);
        } else {
            setDir(0, dy > 0 ? 1 : -1);
        }
    }, { passive: true });

    // 初始化首页显示
    updateHomeBest();
    init();
    state = 'idle';
    draw();

    // 食物动画循环（即使在暂停状态也保持食物脉动效果）
    function animLoop() {
        if (state !== 'playing') draw();
        requestAnimationFrame(animLoop);
    }
    animLoop();
    </script>
</body>
</html>
